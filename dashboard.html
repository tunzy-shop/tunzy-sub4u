<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
        }

        /* Header with logo */
        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            overflow: hidden;
            border: 2px solid white;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        /* Balance Card */
        .balance-card {
            background: #0066cc;
            color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: 700;
        }

        .balance-amount.hidden {
            letter-spacing: 4px;
        }

        .eye-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: white;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Services Grid - 2 Rows of 4 Columns = 8 Buttons */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .service-card {
            background: #f8f9fa;
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .service-card:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,102,204,0.1);
        }

        .service-icon {
            font-size: 24px;
            margin-bottom: 5px;
            color: #0066cc;
        }

        .service-title {
            font-size: 12px;
            font-weight: 500;
            color: #0066cc;
        }

        /* Bottom Navigation - EXACTLY LIKE YOUR IMAGE */
        .bottom-nav {
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #999;
            font-size: 12px;
            font-weight: 500;
        }

        .nav-item.active {
            color: #0066cc;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }

        body {
            padding-bottom: 70px;
        }

        /* Welcome text */
        .welcome-text {
            padding: 10px 20px 0;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .user-name {
            padding: 0 20px 10px;
            font-size: 20px;
            font-weight: 600;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <script>
        // CHECK IF USER IS LOGGED IN
        (function() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
        })();
    </script>

    <div class="app-container">
        <!-- Header with logo -->
        <div class="header">
            <div class="logo-circle">
                <img src="assets/my-logo.jpg" alt="TUNZY" onerror="this.src='https://via.placeholder.com/45/0066cc/ffffff?text=T'">
            </div>
            <span class="app-title">TUNZY SUB 4 YOU</span>
        </div>

        <!-- Welcome -->
        <div class="welcome-text">Welcome back,</div>
        <div class="user-name" id="userName">Loading...</div>

        <!-- Balance Card with Eye Button -->
        <div class="balance-card">
            <div class="balance-left">
                <div>
                    <div class="balance-label">Wallet Balance</div>
                    <div class="balance-amount" id="balanceAmount">₦0.00</div>
                </div>
                <button class="eye-btn" onclick="toggleBalance()" id="eyeBtn">👁️</button>
            </div>
        </div>

        <!-- Services Grid - 8 BUTTONS LIKE YOUR IMAGE -->
        <div class="services-grid">
            <!-- Row 1 -->
            <a href="airtime.html" class="service-card">
                <div class="service-icon">📞</div>
                <div class="service-title">Airtime</div>
            </a>
            <a href="buy-data.html" class="service-card">
                <div class="service-icon">📱</div>
                <div class="service-title">Data</div>
            </a>
            <a href="tv.html" class="service-card">
                <div class="service-icon">📺</div>
                <div class="service-title">Cable TV</div>
            </a>
            <a href="electricity.html" class="service-card">
                <div class="service-icon">💡</div>
                <div class="service-title">Electricity</div>
            </a>
            
            <!-- Row 2 -->
            <a href="savings.html" class="service-card">
                <div class="service-icon">💰</div>
                <div class="service-title">Savings</div>
            </a>
            <a href="exam.html" class="service-card">
                <div class="service-icon">📊</div>
                <div class="service-title">Exam</div>
            </a>
            <a href="airtime-to-cash.html" class="service-card">
                <div class="service-icon">💱</div>
                <div class="service-title">Airtime to Cash</div>
            </a>
            <a href="transfer.html" class="service-card">
                <div class="service-icon">🏦</div>
                <div class="service-title">Transfer</div>
            </a>
        </div>
    </div>

    <!-- Bottom Navigation - EXACTLY LIKE YOUR IMAGE -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="buy-data.html" class="nav-item">
            <div class="nav-icon">📱</div>
            <div>Data</div>
        </a>
        <a href="savings.html" class="nav-item">
            <div class="nav-icon">💰</div>
            <div>Savings</div>
        </a>
        <a href="history.html" class="nav-item">
            <div class="nav-icon">📊</div>
            <div>History</div>
        </a>
        <a href="support.html" class="nav-item">
            <div class="nav-icon">❓</div>
            <div>Support</div>
        </a>
    </div>

    <script>
        let balanceVisible = true;
        let currentBalance = 0;

        // Load REAL user data
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            currentBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            
            document.getElementById('userName').textContent = user?.name || 'User';
            updateBalanceDisplay();
        });

        function updateBalanceDisplay() {
            const balanceElement = document.getElementById('balanceAmount');
            if (balanceVisible) {
                balanceElement.textContent = `₦${currentBalance.toLocaleString()}.00`;
                balanceElement.classList.remove('hidden');
            } else {
                balanceElement.textContent = '••••••';
                balanceElement.classList.add('hidden');
            }
        }

        function toggleBalance() {
            balanceVisible = !balanceVisible;
            const eyeBtn = document.getElementById('eyeBtn');
            eyeBtn.textContent = balanceVisible ? '👁️' : '👁️‍🗨️';
            updateBalanceDisplay();
        }
    </script>
</body>
</html>
