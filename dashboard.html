        let currentUser = { name: '', email: '', balance: 0 };

        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadTransactions();
        });

        function loadUserData() {
            currentUser.name = localStorage.getItem('userName') || 'User';
            currentUser.email = localStorage.getItem('userEmail') || 'user@example.com';
            currentUser.balance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('userDisplayName').textContent = currentUser.name;
            updateWalletDisplay();
        }

        function updateWalletDisplay() {
            document.getElementById('walletDisplay').textContent = `₦${currentUser.balance.toLocaleString()}.00`;
            localStorage.setItem('userBalance', currentUser.balance);
        }

        // ============================================
        // NEW: LOGOUT FUNCTION
        // ============================================
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Optionally clear session, but keep user data for next login
                window.location.href = 'login.html';
            }
        }

        // ============================================
        // NEW: WITHDRAW MONEY
        // ============================================
        function withdrawMoney() {
            if (currentUser.balance <= 0) {
                alert('❌ You have no funds to withdraw.');
                return;
            }

            const amount = prompt(`Enter amount to withdraw (Max: ₦${currentUser.balance}):`, '1000');
            if (!amount) return;

            const withdrawAmount = parseInt(amount);
            if (isNaN(withdrawAmount) || withdrawAmount < 100) {
                alert('❌ Minimum withdrawal is ₦100');
                return;
            }
            if (withdrawAmount > currentUser.balance) {
                alert('❌ Insufficient balance.');
                return;
            }

            // 🔴 In real life, you would call your backend API to process the withdrawal
            // For now, we simulate success
            if (confirm(`Withdraw ₦${withdrawAmount} to your bank account?`)) {
                showLoading('Processing withdrawal...');
                setTimeout(() => {
                    currentUser.balance -= withdrawAmount;
                    updateWalletDisplay();
                    addTransaction('Withdrawal', `-₦${withdrawAmount}`, 'debit');
                    hideLoading();
                    alert(`✅ Withdrawal of ₦${withdrawAmount} successful! It will be sent to your bank.`);
                }, 2000);
            }
        }
