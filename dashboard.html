<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar blue-bg">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🔵</span>
                <span class="logo-text">TUNZY SUB 4 YOU</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="airtime.html">Airtime</a>
                <a href="tv.html">TV</a>
                <a href="electricity.html">Electricity</a>
                <a href="history.html">History</a>
                <a href="#" id="logoutBtn">Logout</a>
                <span class="wallet-balance">💰 ₦5,000.00</span>
            </div>
            <button class="mobile-menu" id="mobileMenu">☰</button>
        </div>
    </nav>

    <div class="container dashboard">
        <!-- Wallet Card -->
        <div class="wallet-card">
            <h2>Welcome back, John! 👋</h2>
            <p>Your wallet balance</p>
            <div class="wallet-balance">💰 ₦5,000.00</div>
            <button class="btn btn-light" onclick="fundWallet(1000)">➕ Fund Wallet</button>
        </div>

        <!-- Quick Actions -->
        <h3>Quick Actions</h3>
        <div class="quick-actions">
            <a href="airtime.html" class="quick-action-btn">
                <div class="quick-action-icon">📱</div>
                <div>Buy Airtime</div>
            </a>
            <a href="tv.html" class="quick-action-btn">
                <div class="quick-action-icon">📺</div>
                <div>Pay TV</div>
            </a>
            <a href="electricity.html" class="quick-action-btn">
                <div class="quick-action-icon">💡</div>
                <div>Electricity</div>
            </a>
            <a href="results.html" class="quick-action-btn">
                <div class="quick-action-icon">📊</div>
                <div>Check Results</div>
            </a>
        </div>

        <!-- Recent Transactions -->
        <h3>Recent Transactions</h3>
        <table class="transaction-table">
            <thead>
                <tr>
                    <th>Service</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <!-- Filled by JavaScript -->
            </tbody>
        </table>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="history.html" style="color: var(--primary-blue);">View All Transactions →</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
                              </html>
