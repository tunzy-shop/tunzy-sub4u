<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
        }

        /* Header with logo */
        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            overflow: hidden;
            border: 2px solid white;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        /* Welcome Card */
        .welcome-card {
            padding: 20px 20px 10px;
        }

        .welcome-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 600;
            color: #0066cc;
        }

        /* Balance Card */
        .balance-card {
            background: #0066cc;
            color: white;
            margin: 10px 20px 20px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: 700;
        }

        .balance-amount.hidden {
            letter-spacing: 4px;
        }

        .eye-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: white;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .fund-btn {
            background: white;
            color: #0066cc;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .fund-btn:hover {
            background: #f0f0f0;
        }

        /* Services Grid - 4 BIG BUTTONS */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .service-card {
            background: #f8f9fa;
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .service-card:hover {
            border-color: #0066cc;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,102,204,0.15);
        }

        /* Image container - NO CIRCLE, just image */
        .service-image {
            width: 70px;
            height: 70px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .service-title {
            font-size: 20px;
            font-weight: 700;
            color: #0066cc;
            margin-bottom: 5px;
        }

        .service-subtitle {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .service-networks {
            font-size: 13px;
            font-weight: 500;
            color: #0066cc;
            margin-top: 3px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #999;
            font-size: 12px;
            font-weight: 500;
        }

        .nav-item.active {
            color: #0066cc;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }

        body {
            padding-bottom: 70px;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
        })();
    </script>

    <div class="app-container">
        <!-- Header with logo -->
        <div class="header">
            <div class="logo-circle">
                <img src="assets/my-logo.jpg" alt="TUNZY" onerror="this.src='https://via.placeholder.com/45/0066cc/ffffff?text=T'">
            </div>
            <span class="app-title">TUNZY SUB 4 YOU</span>
        </div>

        <!-- Welcome -->
        <div class="welcome-card">
            <div class="welcome-text">Welcome back,</div>
            <div class="user-name" id="userName">Loading...</div>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-left">
                <div>
                    <div class="balance-label">Wallet Balance</div>
                    <div class="balance-amount" id="balanceAmount">₦0.00</div>
                </div>
                <button class="eye-btn" onclick="toggleBalance()" id="eyeBtn">👁️</button>
            </div>
            <button class="fund-btn" onclick="window.location.href='fund.html'">Fund</button>
        </div>

        <!-- 4 BIG BUTTONS - CLEAN LIKE YOUR IMAGE -->
        <div class="services-grid">
            <!-- Buy Data -->
            <a href="buy-data.html" class="service-card">
                <div class="service-image">
                    <img src="assets/buydata.png" alt="Buy Data" onerror="this.src='https://via.placeholder.com/70/0066cc/ffffff?text=Data'">
                </div>
                <div class="service-title">Buy Data</div>
                <div class="service-subtitle">All Networks</div>
                <div class="service-networks">MTN · GLO · Airtel · 9mobile</div>
            </a>

            <!-- Airtime -->
            <a href="airtime.html" class="service-card">
                <div class="service-image">
                    <img src="assets/airtime.png" alt="Airtime" onerror="this.src='https://via.placeholder.com/70/0066cc/ffffff?text=Airtime'">
                </div>
                <div class="service-title">Airtime</div>
                <div class="service-subtitle">Recharge</div>
                <div class="service-networks">All Networks</div>
            </a>

            <!-- Cable TV -->
            <a href="tv.html" class="service-card">
                <div class="service-image">
                    <img src="assets/cabletv.png" alt="Cable TV" onerror="this.src='https://via.placeholder.com/70/0066cc/ffffff?text=TV'">
                </div>
                <div class="service-title">Cable TV</div>
                <div class="service-subtitle">DSTV · GOTV</div>
                <div class="service-networks">Startimes</div>
            </a>

            <!-- Electricity -->
            <a href="electricity.html" class="service-card">
                <div class="service-image">
                    <img src="assets/electricity.jpg" alt="Electricity" onerror="this.src='https://via.placeholder.com/70/0066cc/ffffff?text=Power'">
                </div>
                <div class="service-title">Electricity</div>
                <div class="service-subtitle">Prepaid</div>
                <div class="service-networks">IKEDC · EKEDC · IBEDC · AEDC</div>
            </a>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="history.html" class="nav-item">
            <div class="nav-icon">📊</div>
            <div>History</div>
        </a>
        <a href="support.html" class="nav-item">
            <div class="nav-icon">❓</div>
            <div>Support</div>
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            <div>Profile</div>
        </a>
    </div>

    <script>
        let balanceVisible = true;
        let currentBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            currentBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            
            document.getElementById('userName').textContent = user?.name || 'User';
            updateBalanceDisplay();
        });

        function updateBalanceDisplay() {
            const balanceElement = document.getElementById('balanceAmount');
            if (balanceVisible) {
                balanceElement.textContent = `₦${currentBalance.toLocaleString()}.00`;
                balanceElement.classList.remove('hidden');
            } else {
                balanceElement.textContent = '••••••';
                balanceElement.classList.add('hidden');
            }
        }

        function toggleBalance() {
            balanceVisible = !balanceVisible;
            const eyeBtn = document.getElementById('eyeBtn');
            eyeBtn.textContent = balanceVisible ? '👁️' : '👁️‍🗨️';
            updateBalanceDisplay();
        }
    </script>
</body>
</html>
