<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TUNZY SUB 4 YOU</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0066cc, #004d99);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #0066cc;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid white;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #0066cc;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .login-btn:hover {
            background: #004d99;
        }

        .signup-link {
            text-align: center;
            color: #666;
        }

        .signup-link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 15px;
        }

        .forgot-password a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            color: #0066cc;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-circle">
                <img src="assets/my-logo.jpg" alt="TUNZY">
            </div>
            <h1>TUNZY SUB 4 YOU</h1>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="loading" id="loading">Processing...</div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="resetPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                }));
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('userEmail', user.email);
                window.location.href = 'dashboard.html';
            }
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                }));
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('userEmail', user.email);
                
                // Get balance from localStorage or create new
                let balance = localStorage.getItem('userBalance');
                if (balance === null) {
                    balance = '0';
                    localStorage.setItem('userBalance', balance);
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('successMessage').textContent = 'Login successful! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                
                let errorMessage = 'Invalid email or password';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Try again later';
                }
                
                document.getElementById('errorMessage').textContent = errorMessage;
            }
        });

        // Forgot password (sends email)
        async function resetPassword() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Please enter your email address first');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                await auth.sendPasswordResetEmail(email);
                document.getElementById('loading').style.display = 'none';
                alert(`✅ Password reset email sent to ${email}\n\nCheck your inbox and follow the instructions.`);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                let errorMessage = 'Unable to send reset email';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                }
                alert(`❌ ${errorMessage}`);
            }
        }
    </script>
</body>
</html>
