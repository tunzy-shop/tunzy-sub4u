<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #0066cc;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px 0;
        }
        button:hover {
            background: #004d99;
        }
        .error {
            color: red;
            margin: 10px 0;
        }
        .success {
            color: green;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔵 TUNZY ADMIN</h2>
        
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="Admin123">
        
        <button onclick="login()">Login to Admin Panel</button>
    </div>

    <script>
        // Clear any existing admin session on page load
        localStorage.removeItem('adminLoggedIn');
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Clear messages
            document.getElementById('errorMsg').innerHTML = '';
            document.getElementById('successMsg').innerHTML = '';
            
            // Check credentials
            if (username === 'admin' && password === 'Admin123') {
                document.getElementById('successMsg').innerHTML = 'Login successful! Redirecting...';
                
                // Set login flag
                localStorage.setItem('adminLoggedIn', 'true');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                document.getElementById('errorMsg').innerHTML = 'Invalid username or password';
            }
        }
        
        // Allow Enter key
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
