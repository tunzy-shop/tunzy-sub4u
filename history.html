<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - TUNZY SUB 4 YOU</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
        .app-container{max-width:500px;margin:0 auto;background:white;min-height:100vh;padding-bottom:70px}
        .header{background:#0066cc;padding:20px;color:white;display:flex;align-items:center;gap:20px}
        .back-btn{font-size:24px;cursor:pointer;color:white;text-decoration:none}
        .header h1{font-size:20px;font-weight:600}
        .filter-tabs{display:flex;padding:15px;gap:10px;border-bottom:1px solid #e0e0e0}
        .filter-tab{padding:8px 20px;border-radius:20px;background:#f8f9fa;border:1px solid #e0e0e0;cursor:pointer;font-weight:500}
        .filter-tab.active{background:#0066cc;color:white;border-color:#0066cc}
        .transactions-list{padding:20px}
        .transaction-item{background:#f8f9fa;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e0e0e0}
        .transaction-service{font-weight:600;margin-bottom:4px}
        .transaction-date{font-size:12px;color:#999}
        .transaction-amount{font-weight:600;color:#0066cc}
        .transaction-amount.credit{color:#28a745}
        .empty-state{text-align:center;padding:50px;color:#999}
        .bottom-nav{background:white;border-top:1px solid #e0e0e0;display:flex;justify-content:space-around;padding:12px 0;position:fixed;bottom:0;max-width:500px;width:100%}
        .nav-item{text-align:center;text-decoration:none;color:#999;font-size:13px;font-weight:500;padding:5px 0}
        .nav-item.active{color:#0066cc;border-bottom:2px solid #0066cc;padding-bottom:3px}
    </style>
</head>
<body>
    <script src="js/firebase-config.js"></script>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Transaction History</h1>
        </div>
        <div class="filter-tabs">
            <span class="filter-tab active" onclick="filterTransactions('all')">All</span>
            <span class="filter-tab" onclick="filterTransactions('credit')">Credits</span>
            <span class="filter-tab" onclick="filterTransactions('debit')">Debits</span>
        </div>
        <div class="transactions-list" id="transactionsList"></div>
    </div>
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">HOME</a>
        <a href="history.html" class="nav-item active">HISTORY</a>
        <a href="support.html" class="nav-item">SUPPORT</a>
        <a href="profile.html" class="nav-item">PROFILE</a>
    </div>
    <script>
        let allTransactions = [];
        auth.onAuthStateChanged((user) => { if (!user) window.location.href = 'login-page.html'; else loadTransactions(); });

        function loadTransactions() {
            allTransactions = JSON.parse(localStorage.getItem('transactions')) || [];
            displayTransactions('all');
        }

        function displayTransactions(filter) {
            let filtered = allTransactions;
            if (filter === 'credit') filtered = allTransactions.filter(t => t.amount && t.amount.startsWith('+'));
            else if (filter === 'debit') filtered = allTransactions.filter(t => t.amount && t.amount.startsWith('-'));
            let container = document.getElementById('transactionsList');
            if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">No transactions</div>'; return; }
            let html = '';
            filtered.forEach(t => {
                let isCredit = t.amount && t.amount.startsWith('+');
                html += `<div class="transaction-item"><div><div class="transaction-service">${t.type}</div><div class="transaction-date">${t.date}</div></div><div class="transaction-amount ${isCredit ? 'credit' : ''}">${t.amount}</div></div>`;
            });
            container.innerHTML = html;
        }

        function filterTransactions(filter) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            displayTransactions(filter);
        }
    </script>
</body>
</html>
