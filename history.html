<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .transactions-list {
            padding: 20px;
        }

        .transaction-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-service {
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }

        .transaction-date {
            font-size: 12px;
            color: #999;
        }

        .transaction-amount {
            font-weight: 600;
            color: #0066cc;
        }

        .transaction-amount.credit {
            color: #28a745;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
            font-size: 14px;
        }

        .empty-state p {
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Transaction History</h1>
        </div>

        <div class="transactions-list" id="transactionsList">
            <!-- Filled by JavaScript - ONLY REAL TRANSACTIONS -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            const list = document.getElementById('transactionsList');
            
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        No transactions yet
                        <p>Your purchase history will appear here</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            transactions.forEach(t => {
                html += `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-service">${t.type || 'Transaction'}</div>
                            <div class="transaction-date">${t.date || ''}</div>
                        </div>
                        <div class="transaction-amount ${t.amount?.startsWith('+') ? 'credit' : ''}">${t.amount || ''}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
        });
    </script>
</body>
</html>
