<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - TUNZY SUB 4 YOU</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">

  <div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Transaction History</h1>
  </div>

  <div id="txList" style="margin-top:8px;"></div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
  <a href="history.html"   class="nav-item active"><span class="nav-icon">🕐</span>History</a>
  <a href="buy-data.html"  class="nav-item"><span class="nav-icon">📶</span>Data</a>
  <a href="support.html"   class="nav-item"><span class="nav-icon">🎧</span>Support</a>
  <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
  const container = document.getElementById('txList');

  if (txs.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="margin-top:60px;">
        <div class="empty-icon">📄</div>
        <p>No transactions yet.<br>Start by buying data or airtime!</p>
      </div>`;
    return;
  }

  // Icon map
  function getIcon(type) {
    const t = (type || '').toLowerCase();
    if (t.includes('data'))      return '📶';
    if (t.includes('airtime'))   return '📱';
    if (t.includes('tv') || t.includes('cable')) return '📺';
    if (t.includes('electric'))  return '⚡';
    if (t.includes('fund') || t.includes('credit')) return '💰';
    return '🔄';
  }

  container.innerHTML = txs.map(tx => {
    const isCredit = tx.amount && tx.amount.startsWith('+');
    return `
      <div class="tx-item">
        <div class="tx-icon">${getIcon(tx.type)}</div>
        <div class="tx-details">
          <div class="tx-type">${tx.type}</div>
          <div class="tx-date">${tx.date}</div>
        </div>
        <div class="tx-amount ${isCredit ? 'credit' : ''}">${tx.amount}</div>
      </div>
    `;
  }).join('');
});
</script>
</body>
</html>
