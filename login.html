<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0066cc, #004d99);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 10px;
        }

        .logo span {
            display: block;
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
            font-weight: normal;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            background: #004d99;
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            color: #666;
        }

        .signup-link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Modal for Password Reset */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn {
            background: #f5f5f5;
            color: #666;
        }

        .reset-btn {
            background: #0066cc;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                TUNZY SUB 4 YOU
                <span>Sign in to your account</span>
            </div>

            <!-- Error/Success Messages -->
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="showResetModal()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div class="modal" id="resetModal">
        <div class="modal-content">
            <h3>Reset Password</h3>
            <p style="margin-bottom: 15px; color: #666;">Enter your email to receive reset instructions</p>
            
            <input type="email" id="resetEmail" placeholder="Your email address">
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="hideResetModal()">Cancel</button>
                <button class="reset-btn" onclick="resetPassword()">Send Reset Link</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // USER DATABASE
        // ============================================
        const users = [
            {
                email: 'admin@tunzy.com',
                password: 'Admin123',
                name: 'Admin User',
                role: 'admin'
            }
        ];

        // Load existing users from localStorage
        function loadUsers() {
            const saved = localStorage.getItem('users');
            if (saved) {
                return JSON.parse(saved);
            }
            // Save default admin only
            localStorage.setItem('users', JSON.stringify(users));
            return users;
        }

        // Save a new user (from signup)
        function saveUser(userData) {
            const users = loadUsers();
            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
        }

        // ============================================
        // LOGIN FUNCTION
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get users from localStorage
            const users = loadUsers();
            
            // Find user
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Login successful
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    name: user.name,
                    role: user.role || 'user'
                }));
                
                showSuccess('Login successful! Redirecting...');
                
                // Redirect based on role
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1500);
            } else {
                // Login failed
                showError('Invalid email or password');
            }
        });

        // ============================================
        // PASSWORD RESET
        // ============================================
        function showResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function hideResetModal() {
            document.getElementById('resetModal').classList.remove('active');
            document.getElementById('resetEmail').value = '';
        }

        function resetPassword() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            const users = loadUsers();
            const user = users.find(u => u.email === email);
            
            if (user) {
                // In real app, you'd send an email
                alert(`✅ Password reset link sent to ${email}\n\nPlease check your email.`);
                
                // Generate temporary password (in real app)
                // const tempPassword = Math.random().toString(36).slice(-8);
                // user.password = tempPassword;
                // localStorage.setItem('users', JSON.stringify(users));
            } else {
                alert('❌ Email not found');
            }
            
            hideResetModal();
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = message;
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                if (user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });

        // Expose functions for signup page
        window.saveUser = saveUser;
    </script>
</body>
</html>
