<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar blue-bg">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🔵</span>
                <span class="logo-text">TUNZY SUB 4 YOU</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#services">Services</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Welcome Back! 👋</h2>
            <p style="text-align: center; margin-bottom: 30px; color: #666;">Login to your TUNZY SUB 4 YOU account</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="color: var(--primary-blue); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? 
                <a href="signup.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
