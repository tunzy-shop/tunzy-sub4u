<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtime - TUNZY SUB 4 YOU</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .amount-presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 16px;
    margin-bottom: 6px;
  }
  .amount-btn {
    background: #f0f4f8;
    border: 2px solid #d0d8e4;
    border-radius: 12px;
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    color: #333;
    transition: all 0.2s;
  }
  .amount-btn:hover { border-color: #0066cc; color: #0066cc; }
  .amount-btn.selected {
    border-color: #0066cc;
    background: #0066cc;
    color: white;
  }
  .custom-amount {
    padding: 0 16px;
    margin: 10px 0 4px;
  }
  .custom-amount input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #d0d8e4;
    border-radius: 12px;
    font-size: 16px;
    background: #f8fafc;
    color: #111;
  }
  .custom-amount input:focus {
    border-color: #0066cc;
    outline: none;
    background: #fff;
  }
</style>
</head>
<body>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <div class="spinner-text">Processing transaction…</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-overlay" id="toastOverlay">
  <div class="toast-box">
    <div class="toast-icon" id="toastIcon">✅</div>
    <div class="toast-title" id="toastTitle">Success!</div>
    <div class="toast-msg" id="toastMsg"></div>
    <button class="toast-btn" id="toastBtn" onclick="closeToast()">OK</button>
  </div>
</div>

<div class="app-container">

  <div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Buy Airtime</h1>
  </div>

  <div class="balance-info" style="margin-top:14px;">
    <span>💰 Your Balance</span>
    <span id="balanceDisplay">₦0.00</span>
  </div>

  <div class="section-title">Select Network</div>
  <div class="network-tabs" id="networkTabs"></div>

  <div class="phone-input">
    <label>📱 Phone Number</label>
    <input type="tel" id="phoneNumber" placeholder="e.g. 08012345678" maxlength="11">
  </div>

  <div class="section-title">Select Amount</div>
  <div class="amount-presets" id="amountPresets"></div>

  <div class="custom-amount">
    <input type="number" id="customAmount" placeholder="Or enter custom amount (min ₦50)" min="50" max="50000">
  </div>

  <button class="purchase-btn" id="purchaseBtn" onclick="purchaseAirtime()" disabled>
    Select amount
  </button>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
  <a href="history.html"   class="nav-item"><span class="nav-icon">🕐</span>History</a>
  <a href="buy-data.html"  class="nav-item"><span class="nav-icon">📶</span>Data</a>
  <a href="support.html"   class="nav-item"><span class="nav-icon">🎧</span>Support</a>
  <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script src="js/bigisub-config.js"></script>
<script>

const networks = [
  { id: 'mtn',     name: 'MTN',    networkId: 1, image: 'assets/networks/mtn-logo.png' },
  { id: 'glo',     name: 'GLO',    networkId: 2, image: 'assets/networks/glo-logo.png' },
  { id: 'airtel',  name: 'AIRTEL', networkId: 3, image: 'assets/networks/airtel-logo.jpeg' },
  { id: '9mobile', name: '9MOBILE',networkId: 4, image: 'assets/networks/9mobile-logo.jpeg' }
];

let currentNetworkId = 1;
let selectedAmount   = 0;
let userBalance      = 0;

document.addEventListener('DOMContentLoaded', () => {
  userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
  document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';
  loadNetworks();
  loadAmountPresets();

  document.getElementById('customAmount').addEventListener('input', function () {
    const amt = parseInt(this.value);
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    if (amt >= 50) {
      selectedAmount = amt;
      updateBtn();
    } else {
      selectedAmount = 0;
      updateBtn();
    }
  });

  document.getElementById('phoneNumber').addEventListener('input', updateBtn);
});

function loadNetworks() {
  document.getElementById('networkTabs').innerHTML = networks.map(net => `
    <div class="network-tab ${net.id === 'mtn' ? 'active' : ''}"
         onclick="switchNetwork(${net.networkId}, this)">
      <div class="network-logo-box">
        <img src="${net.image}" alt="${net.name}"
             onerror="this.style.display='none';this.parentNode.innerHTML='<b style=color:#0066cc;font-size:16px>${net.name[0]}</b>'">
      </div>
      <span class="network-name">${net.name}</span>
    </div>
  `).join('');
}

function switchNetwork(id, el) {
  currentNetworkId = id;
  document.querySelectorAll('.network-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function loadAmountPresets() {
  const amounts = [100, 200, 500, 1000, 2000, 5000];
  document.getElementById('amountPresets').innerHTML = amounts.map(a => `
    <div class="amount-btn" onclick="selectAmount(${a}, this)">₦${a.toLocaleString()}</div>
  `).join('');
}

function selectAmount(amount, el) {
  selectedAmount = amount;
  document.getElementById('customAmount').value = amount;
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  updateBtn();
}

function updateBtn() {
  const phone = document.getElementById('phoneNumber').value;
  const btn   = document.getElementById('purchaseBtn');
  if (selectedAmount >= 50 && phone.length >= 11) {
    btn.disabled    = false;
    btn.textContent = `Pay ₦${selectedAmount.toLocaleString()} Airtime`;
  } else if (selectedAmount >= 50) {
    btn.disabled    = true;
    btn.textContent = 'Enter phone number';
  } else {
    btn.disabled    = true;
    btn.textContent = 'Select amount';
  }
}

// ── TOAST ────────────────────────────────────────────────
function showToast(type, title, msg) {
  const map = {
    success: { icon: '✅', btnClass: '',            btnText: 'OK' },
    error:   { icon: '❌', btnClass: 'error-btn',   btnText: 'Close' },
    pending: { icon: '⏳', btnClass: 'pending-btn', btnText: 'OK' }
  };
  const cfg = map[type] || map.success;
  document.getElementById('toastIcon').textContent  = cfg.icon;
  document.getElementById('toastIcon').className    = `toast-icon ${type}`;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent   = msg;
  const btn = document.getElementById('toastBtn');
  btn.className   = `toast-btn ${cfg.btnClass}`;
  btn.textContent = cfg.btnText;
  document.getElementById('toastOverlay').classList.add('show');
}
function closeToast() { document.getElementById('toastOverlay').classList.remove('show'); }
function showSpinner() { document.getElementById('spinnerOverlay').classList.add('show'); }
function hideSpinner() { document.getElementById('spinnerOverlay').classList.remove('show'); }

// ── PURCHASE ─────────────────────────────────────────────
async function purchaseAirtime() {
  const phone = document.getElementById('phoneNumber').value.trim();

  if (!selectedAmount || selectedAmount < 50) {
    showToast('error', 'Invalid Amount', 'Please select or enter a valid amount (minimum ₦50).');
    return;
  }
  if (!phone || phone.length < 11) {
    showToast('error', 'Invalid Number', 'Please enter a valid 11-digit phone number.');
    return;
  }
  if (userBalance < selectedAmount) {
    showToast('error', 'Insufficient Balance',
      `Your balance ₦${userBalance.toLocaleString()} is not enough. Please fund your wallet.`);
    return;
  }

  showSpinner();

  try {
    const payload = {
      network:      currentNetworkId,
      phone_number: phone,
      amount:       selectedAmount.toString(),
      airtime_type: 'vtu',
      pin:          BIGISUB_CONFIG.PIN_CODE
    };

    const result = await bigisubRequest('vtu/airtime/purchase/', 'POST', payload);
    hideSpinner();

    if (result.success === true) {
      userBalance -= selectedAmount;
      localStorage.setItem('userBalance', userBalance);
      document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';

      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      txs.unshift({
        type:   `Airtime – ₦${selectedAmount.toLocaleString()}`,
        amount: `-₦${selectedAmount.toLocaleString()}`,
        date:   new Date().toLocaleString(),
        ref:    result.data?.reference || ''
      });
      localStorage.setItem('transactions', JSON.stringify(txs.slice(0, 50)));

      showToast('success', 'Airtime Sent! 🎉',
        `₦${selectedAmount.toLocaleString()} airtime has been sent to ${phone} successfully.`);

      // Reset
      selectedAmount = 0;
      document.getElementById('customAmount').value   = '';
      document.getElementById('phoneNumber').value    = '';
      document.getElementById('purchaseBtn').disabled = true;
      document.getElementById('purchaseBtn').textContent = 'Select amount';
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));

    } else {
      let msg = result.message || 'Purchase failed.';
      if (result.errors) {
        const errs = Object.values(result.errors);
        if (errs.length) msg = Array.isArray(errs[0]) ? errs[0][0] : errs[0];
      }
      showToast('error', 'Purchase Failed', msg);
    }

  } catch (err) {
    hideSpinner();
    showToast('error', 'Network Error', 'Could not reach the server. Check your internet and try again.');
    console.error(err);
  }
}
</script>
</body>
</html>
