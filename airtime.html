<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Airtime - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Same styles as buy-data.html but with airtime-specific */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .container { max-width:500px; margin:0 auto; padding:15px; }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding:15px 0;
        }
        .back-btn {
            font-size:1.5rem; text-decoration:none; color:#0066cc;
            background:none; border:none; cursor:pointer;
        }
        .page-title { font-size:1.3rem; font-weight:bold; color:#0066cc; }
        
        .balance-card {
            background: linear-gradient(135deg, #0066cc, #004d99);
            color:white; padding:15px 20px; border-radius:12px;
            margin:15px 0; display:flex; justify-content:space-between;
        }
        .balance-value { font-size:1.5rem; font-weight:bold; }
        
        .network-tabs {
            display: flex; gap:8px; margin:20px 0;
        }
        .network-tab {
            flex:1; padding:12px; background:white; border:2px solid #e0e0e0;
            border-radius:10px; text-align:center; font-weight:600; cursor:pointer;
        }
        .network-tab.active {
            background:#0066cc; color:white; border-color:#0066cc;
        }
        
        .input-group { margin:20px 0; }
        .input-group label { display:block; margin-bottom:8px; font-weight:500; }
        .input-group input {
            width:100%; padding:15px; border:2px solid #e0e0e0;
            border-radius:10px; font-size:1rem;
        }
        
        .amount-buttons {
            display: flex; gap:10px; flex-wrap: wrap; margin:20px 0;
        }
        .amount-btn {
            flex:1; min-width:80px; padding:12px; background:white;
            border:2px solid #0066cc; border-radius:8px; color:#0066cc;
            font-weight:bold; cursor:pointer;
        }
        .amount-btn:hover {
            background:#0066cc; color:white;
        }
        
        .purchase-btn {
            width:100%; padding:18px; background:#0066cc; color:white;
            border:none; border-radius:12px; font-size:1.2rem;
            font-weight:bold; cursor:pointer; margin:20px 0;
        }
        .purchase-btn:disabled {
            background:#ccc; cursor:not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button onclick="goBack()" class="back-btn">←</button>
            <div class="page-title">Buy Airtime</div>
            <div style="width:30px;"></div>
        </div>

        <div class="balance-card">
            <span>Your Balance</span>
            <span class="balance-value" id="balanceDisplay">₦0.00</span>
        </div>

        <div class="network-tabs">
            <div class="network-tab active" onclick="selectNetwork('mtn')">MTN</div>
            <div class="network-tab" onclick="selectNetwork('glo')">GLO</div>
            <div class="network-tab" onclick="selectNetwork('airtel')">AIRTEL</div>
            <div class="network-tab" onclick="selectNetwork('9mobile')">9MOBILE</div>
        </div>

        <div class="input-group">
            <label>📱 Phone Number</label>
            <input type="tel" id="phoneNumber" placeholder="08012345678" value="08012345678">
        </div>

        <div class="amount-buttons">
            <button class="amount-btn" onclick="setAmount(100)">₦100</button>
            <button class="amount-btn" onclick="setAmount(200)">₦200</button>
            <button class="amount-btn" onclick="setAmount(500)">₦500</button>
            <button class="amount-btn" onclick="setAmount(1000)">₦1,000</button>
        </div>

        <div class="input-group">
            <label>Or enter amount</label>
            <input type="number" id="customAmount" placeholder="Enter amount" min="50" value="500">
        </div>

        <button class="purchase-btn" id="purchaseBtn" onclick="purchaseAirtime()">Buy Airtime</button>
    </div>

    <script>
        const VTPASS = {
            BASE_URL: 'https://api.vtpass.com/api',
            PUBLIC_KEY: 'YOUR_VTPASS_PUBLIC_KEY',  // 🔴 REPLACE
            SECRET_KEY: 'YOUR_VTPASS_SECRET_KEY'   // 🔴 REPLACE
        };

        let currentUser = { balance: 0, email: '' };
        let selectedNetwork = 'mtn';
        let amount = 500;

        document.addEventListener('DOMContentLoaded', loadUserData);

        function loadUserData() {
            currentUser.balance = parseFloat(localStorage.getItem('userBalance')) || 0;
            currentUser.email = localStorage.getItem('userEmail') || 'user@example.com';
            document.getElementById('balanceDisplay').textContent = `₦${currentUser.balance}`;
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = `₦${currentUser.balance}`;
            localStorage.setItem('userBalance', currentUser.balance);
        }

        function goBack() { window.history.back(); }

        function selectNetwork(network) {
            selectedNetwork = network;
            document.querySelectorAll('.network-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function setAmount(val) {
            amount = val;
            document.getElementById('customAmount').value = val;
        }

        async function purchaseAirtime() {
            const phone = document.getElementById('phoneNumber').value;
            amount = parseInt(document.getElementById('customAmount').value);

            if (!phone || phone.length < 11) { alert('Valid phone number'); return; }
            if (amount < 50) { alert('Minimum ₦50'); return; }
            if (currentUser.balance < amount) { alert('Insufficient balance'); return; }

            showLoading('Purchasing airtime...');

            try {
                const response = await fetch(`${VTPASS.BASE_URL}/pay`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'api-key': VTPASS.PUBLIC_KEY,
                        'secret-key': VTPASS.SECRET_KEY
                    },
                    body: JSON.stringify({
                        serviceID: selectedNetwork,
                        phone: phone,
                        amount: amount
                    })
                });

                const data = await response.json();

                if (data.code === '000') {
                    currentUser.balance -= amount;
                    updateBalance();
                    
                    addTransaction('Airtime', `-₦${amount}`, 'debit', '📞');
                    
                    hideLoading();
                    alert(`✅ Airtime sent to ${phone}`);
                } else {
                    hideLoading();
                    alert(`❌ Failed: ${data.response_description}`);
                }
            } catch (error) {
                hideLoading();
                alert('Network error');
            }
        }

        function addTransaction(type, amount, className, icon) {
            let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                type, amount, date: new Date().toLocaleString(), icon
            });
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
        }

        function showLoading(msg) {
            const overlay = document.createElement('div');
            overlay.id = 'loading';
            overlay.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.9); display:flex; justify-content:center; align-items:center; z-index:9999;';
            overlay.innerHTML = `<div style="background:#0066cc; color:white; padding:20px; border-radius:10px;"><div style="width:30px; height:30px; border:3px solid white; border-top-color:transparent; border-radius:50%; animation:spin 1s infinite; margin:0 auto 10px;"></div><p>${msg}</p></div>`;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }
    </script>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
