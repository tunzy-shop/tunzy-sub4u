<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .network-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .network-btn:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
        }

        .network-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #0066cc;
            background: white;
        }

        .network-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .network-name {
            font-weight: 600;
            color: #333;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .amount-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }

        .amount-btn:hover {
            border-color: #0066cc;
        }

        .amount-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .custom-amount {
            margin: 20px 0;
        }

        .custom-amount input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Airtime</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="section-title">Select Network</div>
            <div class="network-grid">
                <div class="network-btn selected" onclick="selectNetwork('mtn')" id="net-mtn">
                    <div class="network-image">
                        <img src="assets/networks/mtn-logo.png" alt="MTN" onerror="this.src='https://via.placeholder.com/60/ffcc00/000000?text=MTN'">
                    </div>
                    <span class="network-name">MTN</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('glo')" id="net-glo">
                    <div class="network-image">
                        <img src="assets/networks/glo-logo.png" alt="GLO" onerror="this.src='https://via.placeholder.com/60/00a859/ffffff?text=GLO'">
                    </div>
                    <span class="network-name">GLO</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('airtel')" id="net-airtel">
                    <div class="network-image">
                        <img src="assets/networks/airtel-logo.jpeg" alt="AIRTEL" onerror="this.src='https://via.placeholder.com/60/e60000/ffffff?text=AIRTEL'">
                    </div>
                    <span class="network-name">AIRTEL</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('9mobile')" id="net-9mobile">
                    <div class="network-image">
                        <img src="assets/networks/9mobile-logo.jpeg" alt="9MOBILE" onerror="this.src='https://via.placeholder.com/60/00aeef/ffffff?text=9MOBILE'">
                    </div>
                    <span class="network-name">9MOBILE</span>
                </div>
            </div>

            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="08012345678" value="08012345678">
            </div>

            <div class="section-title">Select Amount</div>
            <div class="amount-presets">
                <div class="amount-btn" onclick="selectAmount(100)">₦100</div>
                <div class="amount-btn" onclick="selectAmount(200)">₦200</div>
                <div class="amount-btn" onclick="selectAmount(500)">₦500</div>
                <div class="amount-btn" onclick="selectAmount(1000)">₦1,000</div>
                <div class="amount-btn" onclick="selectAmount(2000)">₦2,000</div>
                <div class="amount-btn" onclick="selectAmount(5000)">₦5,000</div>
            </div>

            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="Or enter custom amount">
            </div>

            <button class="purchase-btn" onclick="purchaseAirtime()">Buy Airtime</button>
        </div>
    </div>

    <script>
        let currentNetwork = 'mtn';
        let selectedAmount = 0;
        let userBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
        });

        function selectNetwork(network) {
            currentNetwork = network;
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`net-${network}`).classList.add('selected');
        }

        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('customAmount').value = amount;
            
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function purchaseAirtime() {
            const phone = document.getElementById('phoneNumber').value;
            const customAmount = document.getElementById('customAmount').value;
            const amount = parseInt(customAmount) || selectedAmount;
            
            if (!amount || amount < 50) {
                alert('Please enter a valid amount (minimum ₦50)');
                return;
            }
            
            if (phone.length < 11) {
                alert('Please enter a valid phone number');
                return;
            }
            
            if (userBalance < amount) {
                alert('Insufficient balance');
                return;
            }
            
            userBalance -= amount;
            localStorage.setItem('userBalance', userBalance);
            
            const transaction = {
                type: `${currentNetwork.toUpperCase()} Airtime`,
                amount: `-₦${amount}`,
                date: new Date().toLocaleString()
            };
            
            let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
            
            alert(`✅ Success! ₦${amount} airtime sent to ${phone}`);
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
        }
    </script>
</body>
</html>
