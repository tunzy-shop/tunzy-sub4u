<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime - TUNZY SUB 4 YOU</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .network-tabs {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .network-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .network-tab:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .network-tab.active {
            opacity: 1;
        }

        .network-logo-box {
            width: 70px;
            height: 70px;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .network-tab.active .network-logo-box {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-logo-box img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .network-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .network-tab.active .network-name {
            color: #0066cc;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .amount-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .amount-btn:hover {
            border-color: #0066cc;
        }

        .amount-btn.selected {
            border-color: #0066cc;
            background: #0066cc;
            color: white;
        }

        .custom-amount {
            margin: 20px 0;
        }

        .custom-amount input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Message Boxes */
        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .message-box.error {
            border-top: 5px solid #dc3545;
        }

        .message-box.success {
            border-top: 5px solid #28a745;
        }

        .message-box.pending {
            border-top: 5px solid #ffc107;
        }

        .message-icon {
            font-size: 50px;
        }

        .message-title {
            font-size: 20px;
            font-weight: bold;
        }

        .message-text {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .message-btn:hover {
            background: #004d99;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/firebase-config.js"></script>
    <script src="js/bigisub-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Airtime</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="section-title">Select Network</div>
            <div class="network-tabs" id="networkTabs"></div>

            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number">
            </div>

            <div class="section-title">Select Amount</div>
            <div class="amount-presets" id="amountPresets"></div>

            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="Or enter custom amount" min="50" max="50000">
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseAirtime()" disabled>Select amount</button>
        </div>
    </div>

    <!-- Message Boxes -->
    <div class="overlay" id="overlay"></div>
    
    <div class="message-box error" id="errorBox">
        <div class="message-icon">❌</div>
        <div class="message-title">Error</div>
        <div class="message-text" id="errorText">Something went wrong</div>
        <button class="message-btn" onclick="closeError()">OK</button>
    </div>

    <div class="message-box success" id="successBox">
        <div class="message-icon">✅</div>
        <div class="message-title">Success</div>
        <div class="message-text" id="successText">Transaction successful</div>
        <button class="message-btn" onclick="closeSuccess()">OK</button>
    </div>

    <div class="message-box pending" id="pendingBox">
        <div class="message-icon">⏳</div>
        <div class="message-title">Processing</div>
        <div class="message-text" id="pendingText">Please wait...</div>
    </div>

    <script>
        // Network mapping - network IDs from Bigisub
        // MTN = 1, GLO = 2, Airtel = 3, 9mobile = 4
        const networks = [
            { id: 'mtn', name: 'MTN', networkId: 1, image: 'assets/networks/mtn-logo.png' },
            { id: 'glo', name: 'GLO', networkId: 2, image: 'assets/networks/glo-logo.png' },
            { id: 'airtel', name: 'AIRTEL', networkId: 3, image: 'assets/networks/airtel-logo.jpeg' },
            { id: '9mobile', name: '9MOBILE', networkId: 4, image: 'assets/networks/9mobile-logo.jpeg' }
        ];
        
        let currentNetworkId = 1;
        let selectedAmount = 0;
        let userBalance = 0;
        let userEmail = '';

        // Check authentication
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login-page.html';
            } else {
                userEmail = user.email;
                loadUserData();
            }
        });

        function loadUserData() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            loadNetworks();
            loadAmountPresets();
            
            document.getElementById('customAmount').addEventListener('input', function() {
                const amount = parseInt(this.value);
                if (amount >= 50) {
                    selectedAmount = amount;
                    document.getElementById('purchaseBtn').disabled = false;
                    document.getElementById('purchaseBtn').textContent = `Pay ₦${amount.toLocaleString()} for ₦${amount.toLocaleString()} airtime`;
                } else if (this.value === '') {
                    selectedAmount = 0;
                    document.getElementById('purchaseBtn').disabled = true;
                    document.getElementById('purchaseBtn').textContent = 'Select amount';
                }
            });
        }

        function loadNetworks() {
            const container = document.getElementById('networkTabs');
            let html = '';
            networks.forEach(net => {
                html += `
                    <div class="network-tab ${net.id === 'mtn' ? 'active' : ''}" onclick="switchNetwork(${net.networkId}, '${net.id}')">
                        <div class="network-logo-box">
                            <img src="${net.image}" alt="${net.name}" onerror="this.src='https://via.placeholder.com/60/0066cc/ffffff?text=${net.name.charAt(0)}'">
                        </div>
                        <span class="network-name">${net.name}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function switchNetwork(networkId, networkName) {
            currentNetworkId = networkId;
            document.querySelectorAll('.network-tab').forEach(tab => tab.classList.remove('active'));
            event.target.closest('.network-tab').classList.add('active');
        }

        function loadAmountPresets() {
            const amounts = [100, 200, 500, 1000, 2000, 5000];
            const container = document.getElementById('amountPresets');
            let html = '';
            amounts.forEach(amt => {
                html += `<div class="amount-btn" onclick="selectAmount(${amt})">₦${amt.toLocaleString()}</div>`;
            });
            container.innerHTML = html;
        }

        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('customAmount').value = amount;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            
            document.getElementById('purchaseBtn').disabled = false;
            document.getElementById('purchaseBtn').textContent = `Pay ₦${amount.toLocaleString()} for ₦${amount.toLocaleString()} airtime`;
        }

        // Message functions
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('errorBox').style.display = 'flex';
        }

        function closeError() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('successBox').style.display = 'flex';
            setTimeout(() => {
                closeSuccess();
                window.location.href = 'dashboard.html';
            }, 2000);
        }

        function closeSuccess() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';
        }

        function showPending(message) {
            document.getElementById('pendingText').textContent = message;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('pendingBox').style.display = 'flex';
        }

        function hidePending() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('pendingBox').style.display = 'none';
        }

        // Purchase airtime - CORRECT BIGISUB API ENDPOINT
        async function purchaseAirtime() {
            const phone = document.getElementById('phoneNumber').value;
            
            if (!selectedAmount || selectedAmount < 50) {
                showError('Please select or enter a valid amount (minimum ₦50)');
                return;
            }
            
            if (!phone || phone.length < 11) {
                showError('Please enter a valid phone number (11 digits)');
                return;
            }
            
            if (userBalance < selectedAmount) {
                showError(`Insufficient balance. Your balance is ₦${userBalance.toLocaleString()}`);
                return;
            }

            showPending('Processing transaction...');

            try {
                // CORRECT ENDPOINT: /api/v2/vtu/airtime/purchase/
                const payload = {
                    network: currentNetworkId,
                    phone_number: phone,
                    amount: selectedAmount.toString(),
                    airtime_type: "vtu",
                    pin: BIGISUB_CONFIG.PIN_CODE
                };
                
                console.log('Sending to Bigisub:', payload);
                
                const result = await bigisubRequest('vtu/airtime/purchase/', 'POST', payload);
                
                console.log('Bigisub Response:', result);
                
                hidePending();
                
                if (result.success === true) {
                    // Success - deduct from user balance
                    userBalance -= selectedAmount;
                    localStorage.setItem('userBalance', userBalance);
                    
                    const transaction = {
                        type: `Airtime - ₦${selectedAmount.toLocaleString()}`,
                        amount: `-₦${selectedAmount.toLocaleString()}`,
                        date: new Date().toLocaleString()
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ₦${selectedAmount.toLocaleString()} airtime sent to ${phone}`);
                    
                    selectedAmount = 0;
                    document.getElementById('customAmount').value = '';
                    document.getElementById('purchaseBtn').disabled = true;
                    document.getElementById('purchaseBtn').textContent = 'Select amount';
                    document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
                    
                } else {
                    // Show the error message from API
                    let errorMsg = result.message || 'Purchase failed';
                    
                    // Check if there are detailed errors
                    if (result.errors) {
                        const errors = Object.values(result.errors);
                        if (errors.length > 0) {
                            errorMsg = errors[0][0] || errorMsg;
                        }
                    }
                    
                    showError(errorMsg);
                }
                
            } catch (error) {
                hidePending();
                console.error('Error:', error);
                showError('Network error. Please check your connection and try again.');
            }
        }
    </script>
</body>
</html>
