<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        /* Network Tabs with SQUARE LOGOS */
        .network-tabs {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .network-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .network-tab:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .network-tab.active {
            opacity: 1;
        }

        .network-logo-box {
            width: 70px;
            height: 70px;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .network-tab.active .network-logo-box {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-logo-box img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .network-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .network-tab.active .network-name {
            color: #0066cc;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .amount-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .amount-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s;
        }

        .amount-btn:hover {
            border-color: #0066cc;
            transform: translateY(-3px);
        }

        .amount-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .custom-amount {
            margin: 20px 0;
        }

        .custom-amount input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .custom-amount input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/bigisub-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Airtime</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>

            <div class="section-title">Select Network</div>
            <div class="network-tabs" id="networkTabs"></div>

            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number">
            </div>

            <div class="section-title">Select Amount</div>
            <div class="amount-presets" id="amountPresets"></div>

            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="Or enter custom amount" min="50" max="50000">
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseAirtime()" disabled>Select amount</button>
        </div>
    </div>

    <script>
        // Network mapping for Bigisub
        const networks = [
            { id: 'mtn', name: 'MTN', networkId: 1, image: 'assets/networks/mtn-logo.png' },
            { id: 'glo', name: 'GLO', networkId: 2, image: 'assets/networks/glo-logo.png' },
            { id: 'airtel', name: 'AIRTEL', networkId: 3, image: 'assets/networks/airtel-logo.jpeg' },
            { id: '9mobile', name: '9MOBILE', networkId: 4, image: 'assets/networks/9mobile-logo.jpeg' }
        ];
        
        // NO PROFIT on airtime - 100 for 100 pricing!
        const AIRTIME_PROFIT = 0;
        
        let currentNetworkId = 1;
        let selectedAmount = 0;
        let userBalance = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            loadNetworks();
            loadAmountPresets();
            
            document.getElementById('customAmount').addEventListener('input', function() {
                const amount = parseInt(this.value);
                if (amount >= 50) {
                    selectedAmount = amount;
                    document.getElementById('purchaseBtn').disabled = false;
                    const formattedAmount = amount.toLocaleString();
                    document.getElementById('purchaseBtn').textContent = `Pay ₦${formattedAmount} for ₦${formattedAmount} airtime`;
                } else if (this.value === '') {
                    selectedAmount = 0;
                    document.getElementById('purchaseBtn').disabled = true;
                    document.getElementById('purchaseBtn').textContent = 'Select amount';
                }
            });
        });

        // Load network tabs with SQUARE LOGOS
        function loadNetworks() {
            const container = document.getElementById('networkTabs');
            let html = '';
            networks.forEach(net => {
                html += `
                    <div class="network-tab ${net.id === 'mtn' ? 'active' : ''}" onclick="switchNetwork(${net.networkId}, '${net.id}')">
                        <div class="network-logo-box">
                            <img src="${net.image}" alt="${net.name}" onerror="this.src='https://via.placeholder.com/60/0066cc/ffffff?text=${net.name.charAt(0)}'">
                        </div>
                        <span class="network-name">${net.name}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Switch network
        function switchNetwork(networkId, networkName) {
            currentNetworkId = networkId;
            document.querySelectorAll('.network-tab').forEach(tab => tab.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Load amount presets with formatted numbers
        function loadAmountPresets() {
            const amounts = [100, 200, 500, 1000, 2000, 5000];
            const container = document.getElementById('amountPresets');
            let html = '';
            amounts.forEach(amt => {
                const formattedAmt = amt.toLocaleString();
                html += `<div class="amount-btn" onclick="selectAmount(${amt})">₦${formattedAmt}</div>`;
            });
            container.innerHTML = html;
        }

        // Select amount from preset
        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('customAmount').value = amount;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            const formattedAmount = amount.toLocaleString();
            document.getElementById('purchaseBtn').disabled = false;
            document.getElementById('purchaseBtn').textContent = `Pay ₦${formattedAmount} for ₦${formattedAmount} airtime`;
        }

        // Show messages
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = msg;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            const pendingDiv = document.getElementById('pendingMessage');
            pendingDiv.style.display = 'block';
            pendingDiv.textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        // Purchase airtime - BIGISUB API CALL
        async function purchaseAirtime() {
            const phone = document.getElementById('phoneNumber').value;
            
            if (!selectedAmount || selectedAmount < 50) {
                showError('Please select or enter a valid amount (minimum ₦50)');
                return;
            }
            
            if (!phone || phone.length < 11) {
                showError('Please enter a valid phone number (11 digits)');
                return;
            }
            
            // User pays exactly the amount (NO PROFIT)
            const userPayment = selectedAmount;
            
            if (userBalance < userPayment) {
                showError('Insufficient balance. Please fund your wallet');
                return;
            }

            showPending('Processing transaction...');

            try {
                // BIGISUB API CALL for airtime
                const payload = {
                    network: currentNetworkId,
                    phone_number: phone,
                    amount: selectedAmount,
                    pin_code: BIGISUB_CONFIG.PIN_CODE
                };
                
                const result = await bigisubRequest('airtime/purchase/', 'POST', payload);
                
                hidePending();
                
                if (result.success || result.status === 'success') {
                    // Success - deduct from user balance
                    userBalance -= userPayment;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    // Record transaction
                    const transaction = {
                        type: `Airtime - ₦${selectedAmount.toLocaleString()}`,
                        amount: `-₦${userPayment.toLocaleString()}`,
                        date: new Date().toLocaleString()
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ₦${selectedAmount.toLocaleString()} airtime sent to ${phone}`);
                    
                    // Reset selection
                    selectedAmount = 0;
                    document.getElementById('customAmount').value = '';
                    document.getElementById('purchaseBtn').disabled = true;
                    document.getElementById('purchaseBtn').textContent = 'Select amount';
                    document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
                    
                } else {
                    showError(result.message || result.error || 'Purchase failed');
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }
    </script>
</body>
</html>
