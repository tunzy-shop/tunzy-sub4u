<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 15px 0;
        }

        .network-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .network-btn:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
        }

        .network-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #0066cc;
            background: white;
        }

        .network-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .network-name {
            font-weight: 600;
            font-size: 14px;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        /* ✅ NO DEFAULT NUMBER - EMPTY PLACEHOLDER ONLY */
        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .amount-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .amount-btn:hover {
            border-color: #0066cc;
        }

        .amount-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .custom-amount {
            margin: 20px 0;
        }

        .custom-amount input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .gift-option {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/vtpass-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Airtime</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>

            <div class="section-title">Select Network</div>
            <div class="network-grid">
                <div class="network-btn selected" onclick="selectNetwork('mtn')" id="airnet-mtn">
                    <div class="network-image">
                        <img src="assets/networks/mtn-logo.png" alt="MTN">
                    </div>
                    <span class="network-name">MTN</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('glo')" id="airnet-glo">
                    <div class="network-image">
                        <img src="assets/networks/glo-logo.png" alt="GLO">
                    </div>
                    <span class="network-name">GLO</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('airtel')" id="airnet-airtel">
                    <div class="network-image">
                        <img src="assets/networks/airtel-logo.jpeg" alt="AIRTEL">
                    </div>
                    <span class="network-name">AIRTEL</span>
                </div>
                <div class="network-btn" onclick="selectNetwork('9mobile')" id="airnet-9mobile">
                    <div class="network-image">
                        <img src="assets/networks/9mobile-logo.jpeg" alt="9MOBILE">
                    </div>
                    <span class="network-name">9MOBILE</span>
                </div>
            </div>

            <div class="phone-input">
                <label>Phone Number</label>
                <!-- ✅ NO DEFAULT NUMBER - EMPTY -->
                <input type="tel" id="phoneNumber" placeholder="Enter phone number" value="">
            </div>

            <div class="gift-option">
                <label>
                    <input type="checkbox" id="isGift"> 🎁 Buy as gift
                </label>
            </div>

            <div class="section-title">Select Amount</div>
            <div class="amount-presets">
                <div class="amount-btn" onclick="selectAmount(100)">₦100</div>
                <div class="amount-btn" onclick="selectAmount(200)">₦200</div>
                <div class="amount-btn" onclick="selectAmount(500)">₦500</div>
                <div class="amount-btn" onclick="selectAmount(1000)">₦1,000</div>
                <div class="amount-btn" onclick="selectAmount(2000)">₦2,000</div>
                <div class="amount-btn" onclick="selectAmount(5000)">₦5,000</div>
            </div>

            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="Or enter custom amount" min="50" max="50000" oninput="calculatePrice()">
            </div>

            <button class="purchase-btn" onclick="purchaseAirtime()">Buy Airtime</button>
        </div>
    </div>

    <script>
        const networkServiceMap = {
            'mtn': VTPASS_CONFIG.services.MTN_AIRTIME,
            'glo': VTPASS_CONFIG.services.GLO_AIRTIME,
            'airtel': VTPASS_CONFIG.services.AIRTEL_AIRTIME,
            '9mobile': VTPASS_CONFIG.services.NINEMOBILE_AIRTIME
        };

        const PROFIT_PER_AIRTIME = VTPASS_CONFIG.PROFIT.AIRTIME;

        let currentNetwork = 'mtn';
        let selectedAmount = 0;
        let sellingAmount = 0;
        let userBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
        });

        function selectNetwork(network) {
            currentNetwork = network;
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`airnet-${network}`).classList.add('selected');
        }

        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('customAmount').value = amount;
            calculatePrice();
            
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function calculatePrice() {
            const amount = parseInt(document.getElementById('customAmount').value) || selectedAmount;
            if (amount >= 50) {
                sellingAmount = amount + PROFIT_PER_AIRTIME;
            }
        }

        function showError(msg) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            document.getElementById('pendingMessage').style.display = 'block';
            document.getElementById('pendingMessage').textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        async function purchaseAirtime() {
            const phone = document.getElementById('phoneNumber').value;
            const customAmount = document.getElementById('customAmount').value;
            const isGift = document.getElementById('isGift').checked;
            const recipientPhone = isGift ? phone : phone;
            
            const costAmount = parseInt(customAmount) || selectedAmount;
            sellingAmount = costAmount + PROFIT_PER_AIRTIME;
            
            if (!costAmount || costAmount < 50) {
                showError('Please enter a valid amount (minimum ₦50)');
                return;
            }
            
            if (costAmount > 50000) {
                showError('Maximum amount is ₦50,000');
                return;
            }
            
            if (!phone || phone.length < 11) {
                showError('Please enter a valid phone number');
                return;
            }
            
            if (userBalance < sellingAmount) {
                showError('Insufficient balance');
                return;
            }

            showPending('Processing transaction...');

            try {
                const payload = {
                    serviceID: networkServiceMap[currentNetwork],
                    amount: costAmount,
                    phone: recipientPhone
                };
                
                const result = await vtpassApiCall('/pay', payload);
                const response = result.handled;
                
                hidePending();
                
                if (response.isSuccess && result.content?.transactions?.status === 'delivered') {
                    userBalance -= sellingAmount;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    recordProfit(
                        `${currentNetwork.toUpperCase()} Airtime`,
                        costAmount,
                        sellingAmount,
                        `Phone: ${recipientPhone}`
                    );
                    
                    const transaction = {
                        type: `${currentNetwork.toUpperCase()} Airtime`,
                        amount: `-₦${sellingAmount}`,
                        date: new Date().toLocaleString()
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ₦${costAmount} airtime sent to ${recipientPhone}`);
                    
                } else if (response.isPending) {
                    showPending('Transaction processing. Please wait...');
                } else {
                    showError(response.message);
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }
    </script>
</body>
</html>
