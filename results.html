<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Pins - TUNZY SUB 4 YOU</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .exam-tabs {
    display: flex;
    gap: 10px;
    padding: 0 16px;
    flex-wrap: wrap;
  }
  .exam-tab {
    flex: 1;
    min-width: 100px;
    padding: 12px 8px;
    background: #f0f4f8;
    border: 2px solid #d0d8e4;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    color: #333;
    transition: all 0.2s;
  }
  .exam-tab:hover  { border-color: #0066cc; color: #0066cc; }
  .exam-tab.active { background: #0066cc; color: white; border-color: #0066cc; }

  .quantity-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 16px;
    margin-bottom: 4px;
  }
  .qty-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 2px solid #d0d8e4;
    background: #f0f4f8;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #0066cc;
    transition: all 0.2s;
  }
  .qty-btn:hover { background: #ddeeff; border-color: #0066cc; }
  .qty-display {
    font-size: 22px;
    font-weight: 800;
    color: #111;
    min-width: 40px;
    text-align: center;
  }
  .qty-label { font-size: 13px; color: #888; }

  .pin-result-box {
    margin: 0 16px;
    background: #fffbdd;
    border: 2px solid #f0c040;
    border-radius: 12px;
    padding: 18px;
    display: none;
  }
  .pin-result-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .pin-item {
    background: white;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pin-value {
    font-size: 17px;
    font-weight: 900;
    color: #0066cc;
    letter-spacing: 2px;
  }
  .copy-pin-btn {
    background: #0066cc;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <div class="spinner-text">Purchasing exam pin…</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-overlay" id="toastOverlay">
  <div class="toast-box">
    <div class="toast-icon" id="toastIcon">✅</div>
    <div class="toast-title" id="toastTitle">Success!</div>
    <div class="toast-msg" id="toastMsg"></div>
    <button class="toast-btn" id="toastBtn" onclick="closeToast()">OK</button>
  </div>
</div>

<div class="app-container">

  <div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Exam Pins</h1>
  </div>

  <div class="balance-info" style="margin-top:14px;">
    <span>💰 Your Balance</span>
    <span id="balanceDisplay">₦0.00</span>
  </div>

  <!-- PIN RESULTS (shown after success) -->
  <div class="pin-result-box" id="pinResultBox" style="margin-top:14px;">
    <div class="pin-result-title">🎓 Your Exam PIN(s) — Keep these safe!</div>
    <div id="pinList"></div>
  </div>

  <div class="section-title">Select Exam Body</div>
  <div class="exam-tabs" id="examTabs"></div>

  <div class="section-title" style="margin-top:14px;">Select Quantity</div>
  <div class="quantity-row">
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <div>
      <div class="qty-display" id="qtyDisplay">1</div>
      <div class="qty-label">pin(s)</div>
    </div>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
    <div style="margin-left:auto; text-align:right;">
      <div style="font-size:13px; color:#888;">Total</div>
      <div style="font-size:18px; font-weight:800; color:#0066cc;" id="totalPrice">₦0</div>
    </div>
  </div>

  <div class="section-title" style="margin-top:14px;">Select Pin Type</div>
  <div class="plans-grid" id="pinTypes"></div>

  <button class="purchase-btn" id="purchaseBtn" onclick="purchasePin()" disabled>
    Select a pin type
  </button>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
  <a href="history.html"   class="nav-item"><span class="nav-icon">🕐</span>History</a>
  <a href="buy-data.html"  class="nav-item"><span class="nav-icon">📶</span>Data</a>
  <a href="support.html"   class="nav-item"><span class="nav-icon">🎧</span>Support</a>
  <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script src="js/bigisub-config.js"></script>
<script>

const examBodies = [
  { id: 'waec',  name: 'WAEC' },
  { id: 'neco',  name: 'NECO' },
  { id: 'nabteb',name: 'NABTEB' },
  { id: 'jamb',  name: 'JAMB' }
];

const pinTypes = {
  waec: [
    { id: 'waec_scratch', name: 'Scratch Card', price: 1000, serviceId: 'waec' },
    { id: 'waec_reg',     name: 'Registration', price: 12000, serviceId: 'waec-reg' }
  ],
  neco: [
    { id: 'neco_scratch', name: 'Scratch Card', price: 800, serviceId: 'neco' },
    { id: 'neco_reg',     name: 'Registration', price: 10000, serviceId: 'neco-reg' }
  ],
  nabteb: [
    { id: 'nabteb_scratch', name: 'Scratch Card', price: 700, serviceId: 'nabteb' }
  ],
  jamb: [
    { id: 'jamb_pin', name: 'JAMB PIN',   price: 700,  serviceId: 'jamb-pin' },
    { id: 'jamb_utme',name: 'UTME Form',  price: 5700, serviceId: 'jamb-utme' }
  ]
};

let currentExam     = 'waec';
let selectedPinType = null;
let selectedPrice   = 0;
let selectedService = '';
let quantity        = 1;
let userBalance     = 0;

document.addEventListener('DOMContentLoaded', () => {
  userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
  document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';
  loadExamTabs();
  loadPinTypes();
});

function loadExamTabs() {
  document.getElementById('examTabs').innerHTML = examBodies.map(e => `
    <div class="exam-tab ${e.id === 'waec' ? 'active' : ''}"
         onclick="switchExam('${e.id}', this)">${e.name}</div>
  `).join('');
}

function switchExam(id, el) {
  currentExam = id;
  document.querySelectorAll('.exam-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  resetSelection();
  loadPinTypes();
}

function loadPinTypes() {
  const types = pinTypes[currentExam] || [];
  document.getElementById('pinTypes').innerHTML = types.map(t => `
    <div class="plan-card" onclick="selectPinType('${t.id}', '${t.name}', ${t.price}, '${t.serviceId}', this)">
      <div class="plan-name">${t.name}</div>
      <div class="plan-price">₦${t.price.toLocaleString()}</div>
      <div class="plan-validity">per pin</div>
    </div>
  `).join('');
  updateTotal();
}

function selectPinType(id, name, price, service, el) {
  selectedPinType = name;
  selectedPrice   = price;
  selectedService = service;
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateTotal();
  checkBtn();
}

function changeQty(delta) {
  quantity = Math.max(1, Math.min(5, quantity + delta));
  document.getElementById('qtyDisplay').textContent = quantity;
  updateTotal();
  checkBtn();
}

function updateTotal() {
  const total = selectedPrice * quantity;
  document.getElementById('totalPrice').textContent = total > 0
    ? '₦' + total.toLocaleString()
    : '₦0';
}

function resetSelection() {
  selectedPinType = null;
  selectedPrice   = 0;
  selectedService = '';
  quantity        = 1;
  document.getElementById('qtyDisplay').textContent = '1';
  document.getElementById('totalPrice').textContent = '₦0';
  const btn = document.getElementById('purchaseBtn');
  btn.disabled    = true;
  btn.textContent = 'Select a pin type';
}

function checkBtn() {
  const btn   = document.getElementById('purchaseBtn');
  const total = selectedPrice * quantity;
  if (selectedPinType) {
    btn.disabled    = false;
    btn.textContent = `Buy ${quantity} ${selectedPinType} Pin${quantity > 1 ? 's' : ''} — ₦${total.toLocaleString()}`;
  } else {
    btn.disabled    = true;
    btn.textContent = 'Select a pin type';
  }
}

// ── TOAST ────────────────────────────────────────────────
function showToast(type, title, msg) {
  const map = {
    success: { icon: '✅', btnClass: '',           btnText: 'OK' },
    error:   { icon: '❌', btnClass: 'error-btn',  btnText: 'Close' },
    pending: { icon: '⏳', btnClass: 'pending-btn',btnText: 'OK' }
  };
  const cfg = map[type] || map.success;
  document.getElementById('toastIcon').textContent  = cfg.icon;
  document.getElementById('toastIcon').className    = `toast-icon ${type}`;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent   = msg;
  const btn = document.getElementById('toastBtn');
  btn.className   = `toast-btn ${cfg.btnClass}`;
  btn.textContent = cfg.btnText;
  document.getElementById('toastOverlay').classList.add('show');
}
function closeToast() { document.getElementById('toastOverlay').classList.remove('show'); }
function showSpinner() { document.getElementById('spinnerOverlay').classList.add('show'); }
function hideSpinner() { document.getElementById('spinnerOverlay').classList.remove('show'); }

function copyPin(pin) {
  navigator.clipboard.writeText(pin).then(() => alert('PIN copied: ' + pin));
}

// ── PURCHASE ─────────────────────────────────────────────
async function purchasePin() {
  if (!selectedPinType) {
    showToast('error', 'No Pin Selected', 'Please select a pin type first.'); return;
  }
  const total = selectedPrice * quantity;
  if (userBalance < total) {
    showToast('error', 'Insufficient Balance',
      `Your balance ₦${userBalance.toLocaleString()} is not enough for ₦${total.toLocaleString()}.`); return;
  }

  showSpinner();

  try {
    const payload = {
      service:  selectedService,
      quantity: quantity,
      pin_code: BIGISUB_CONFIG.PIN_CODE
    };

    const result = await bigisubRequest('exam/purchase/', 'POST', payload);
    hideSpinner();

    if (result.success || result.status === 'success') {
      userBalance -= total;
      localStorage.setItem('userBalance', userBalance);
      document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';

      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      txs.unshift({
        type:   `${currentExam.toUpperCase()} ${selectedPinType} × ${quantity}`,
        amount: `-₦${total.toLocaleString()}`,
        date:   new Date().toLocaleString()
      });
      localStorage.setItem('transactions', JSON.stringify(txs.slice(0, 50)));

      // Show pins if returned
      const pins = result.pins || result.data?.pins || [];
      if (pins.length > 0) {
        document.getElementById('pinList').innerHTML = pins.map(p => `
          <div class="pin-item">
            <span class="pin-value">${p}</span>
            <button class="copy-pin-btn" onclick="copyPin('${p}')">📋 Copy</button>
          </div>
        `).join('');
        document.getElementById('pinResultBox').style.display = 'block';
      }

      showToast('success', 'Purchase Successful! 🎓',
        `${quantity} ${selectedPinType} pin${quantity > 1 ? 's' : ''} purchased for ₦${total.toLocaleString()}.`);

      resetSelection();
      document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));

    } else {
      showToast('error', 'Purchase Failed',
        result.message || result.error || 'Something went wrong. Please try again.');
    }

  } catch (err) {
    hideSpinner();
    showToast('error', 'Network Error', 'Could not reach the server. Check your internet and try again.');
    console.error(err);
  }
}
</script>
</body>
</html>
