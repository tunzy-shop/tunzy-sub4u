<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .fund-container {
            padding: 20px;
        }

        .balance-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .current-balance {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            color: #0066cc;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }

        .amount-btn:hover {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .amount-btn.selected {
            border-color: #0066cc;
            background: #0066cc;
            color: white;
        }

        .custom-amount {
            margin: 20px 0;
        }

        .custom-amount label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .custom-amount input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .custom-amount input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .fund-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .fund-btn:hover {
            background: #004d99;
        }

        .note {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>Fund Wallet</h1>
        </div>

        <div class="fund-container">
            <div class="balance-display">
                <div class="current-balance">Current Balance</div>
                <div class="balance-amount" id="balanceDisplay">₦0.00</div>
            </div>

            <div class="amount-grid">
                <button class="amount-btn" onclick="selectAmount(1000)">₦1,000</button>
                <button class="amount-btn" onclick="selectAmount(2000)">₦2,000</button>
                <button class="amount-btn" onclick="selectAmount(5000)">₦5,000</button>
                <button class="amount-btn" onclick="selectAmount(10000)">₦10,000</button>
                <button class="amount-btn" onclick="selectAmount(20000)">₦20,000</button>
                <button class="amount-btn" onclick="selectAmount(50000)">₦50,000</button>
            </div>

            <div class="custom-amount">
                <label>Or enter custom amount</label>
                <input type="number" id="customAmount" placeholder="Enter amount" min="100">
            </div>

            <button class="fund-btn" onclick="processFunding()">Proceed to Payment</button>
            <div class="note">🔒 Secured by Paystack</div>
        </div>
    </div>

    <script>
        // 🔴 YOUR PAYSTACK PUBLIC KEY - PASTE HERE!
        const PAYSTACK_PUBLIC_KEY = 'pk_live_xxxxxxxxxxxxxxxxxxxxx'; // <-- PASTE YOUR KEY HERE

        let selectedAmount = 0;
        let userEmail = '';
        let userBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            userEmail = localStorage.getItem('userEmail') || '';
            
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
        });

        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('customAmount').value = amount;
            
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        async function processFunding() {
            const customAmount = document.getElementById('customAmount').value;
            const amount = parseInt(customAmount) || selectedAmount;
            
            if (!amount || amount < 100) {
                alert('Please enter a valid amount (minimum ₦100)');
                return;
            }

            try {
                if (!window.PaystackPop) {
                    await loadScript('https://js.paystack.co/v1/inline.js');
                }

                const handler = PaystackPop.setup({
                    key: PAYSTACK_PUBLIC_KEY,
                    email: userEmail,
                    amount: amount * 100,
                    currency: 'NGN',
                    ref: 'TUNZY_' + Date.now(),
                    callback: function(response) {
                        // Payment successful
                        userBalance += amount;
                        localStorage.setItem('userBalance', userBalance);
                        
                        // Record transaction
                        const transaction = {
                            type: 'Wallet Funding',
                            amount: `+₦${amount}`,
                            date: new Date().toLocaleString()
                        };
                        
                        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                        transactions.unshift(transaction);
                        localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                        
                        alert(`✅ Wallet funded with ₦${amount}`);
                        window.location.href = 'index.html';
                    },
                    onClose: function() {
                        alert('Payment cancelled');
                    }
                });
                
                handler.openIframe();
                
            } catch (error) {
                alert('Payment failed. Please try again.');
                console.error(error);
            }
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
    </script>
</body>
</html>
