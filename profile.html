<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - TUNZY SUB 4 YOU</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">

  <div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Account</h1>
  </div>

  <!-- Profile Card -->
  <div style="margin: 20px 16px; background:#f8fafc; border-radius:16px; padding:28px 20px;
              text-align:center; border:1px solid #d0d8e4;">
    <div class="profile-avatar" id="profileAvatar">👤</div>
    <div class="profile-name" id="profileName">Loading…</div>
    <div class="profile-email" id="profileEmail"></div>
  </div>

  <!-- Menu -->
  <div class="profile-menu">
    <a href="#" class="profile-menu-item" onclick="editInfo()">
      <div class="profile-menu-icon" style="background:#ddeeff;">✏️</div>
      Edit Personal Info
      <span class="profile-menu-arrow">›</span>
    </a>
    <a href="#" class="profile-menu-item">
      <div class="profile-menu-icon" style="background:#e8e0ff;">🪪</div>
      KYC Verification
      <span class="badge-tier">Tier 1</span>
      <span class="profile-menu-arrow">›</span>
    </a>
    <a href="#" class="profile-menu-item">
      <div class="profile-menu-icon" style="background:#e0f0ff;">⚙️</div>
      Account Security
      <span class="profile-menu-arrow">›</span>
    </a>
    <a href="#" class="profile-menu-item">
      <div class="profile-menu-icon" style="background:#fff5dd;">🔑</div>
      Transaction PIN
      <span class="profile-menu-arrow">›</span>
    </a>
  </div>

  <div class="signout-row" style="margin-top:24px;">
    <button class="signout-btn" onclick="signOut()">⇥ Sign Out</button>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
  <a href="history.html"   class="nav-item"><span class="nav-icon">🕐</span>History</a>
  <a href="buy-data.html"  class="nav-item"><span class="nav-icon">📶</span>Data</a>
  <a href="support.html"   class="nav-item"><span class="nav-icon">🎧</span>Support</a>
  <a href="profile.html"   class="nav-item active"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('userData') || '{}');
  document.getElementById('profileName').textContent  = user.name  || localStorage.getItem('userName') || 'User';
  document.getElementById('profileEmail').textContent = user.email || localStorage.getItem('userEmail') || '';
});

function editInfo() {
  alert('Edit Personal Info feature coming soon.');
}

function signOut() {
  if (confirm('Are you sure you want to sign out?')) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}
</script>
</body>
</html>
