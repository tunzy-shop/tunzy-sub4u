<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .profile-section {
            padding: 20px;
        }

        .profile-card {
            background: #f8f9fa;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #0066cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 40px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-email {
            color: #666;
            margin-bottom: 15px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .menu-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #f8f9fa;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: #e6f0ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0066cc;
        }

        .menu-text {
            flex: 1;
        }

        .menu-title {
            font-weight: 500;
            margin-bottom: 3px;
        }

        .menu-subtitle {
            font-size: 12px;
            color: #999;
        }

        .logout-btn {
            margin: 20px;
            padding: 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: calc(100% - 40px);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>My Profile</h1>
        </div>

        <div class="profile-section">
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-email" id="profileEmail">loading@email.com</div>
            </div>

            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value" id="statBalance">₦0</div>
                    <div class="stat-label">Balance</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statTransactions">0</div>
                    <div class="stat-label">Transactions</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statJoined">2024</div>
                    <div class="stat-label">Joined</div>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-icon">📱</div>
                <div class="menu-text">
                    <div class="menu-title">Phone Number</div>
                    <div class="menu-subtitle" id="profilePhone">08012345678</div>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-icon">🔔</div>
                <div class="menu-text">
                    <div class="menu-title">Notifications</div>
                    <div class="menu-subtitle">Email, SMS</div>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-icon">🔒</div>
                <div class="menu-text">
                    <div class="menu-title">Change Password</div>
                    <div class="menu-subtitle">Update your password</div>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const name = localStorage.getItem('userName') || 'John Doe';
            const email = localStorage.getItem('userEmail') || 'john@example.com';
            const balance = localStorage.getItem('userBalance') || '5000';
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileEmail').textContent = email;
            document.getElementById('statBalance').textContent = `₦${parseFloat(balance).toLocaleString()}`;
            document.getElementById('statTransactions').textContent = transactions.length;
        });

        function logout() {
            if (confirm('Logout?')) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
