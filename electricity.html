<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .disco-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .disco-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 13px;
        }

        .disco-btn:hover {
            border-color: #0066cc;
        }

        .disco-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .meter-type {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .meter-option {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .meter-option:hover {
            border-color: #0066cc;
        }

        .meter-option.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .input-field {
            margin: 20px 0;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .input-field input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-field input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .customer-info {
            background: #e6f0ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #0066cc;
            display: none;
        }

        .customer-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .customer-info .label {
            font-weight: 600;
            color: #0066cc;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .token-display {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .token-number {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            letter-spacing: 2px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <script src="js/bigisub-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Electricity</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>
            <div class="token-display" id="tokenDisplay">
                <div>Your Token</div>
                <div class="token-number" id="tokenNumber"></div>
                <div style="font-size: 12px; color: #666;">Please keep this token safe</div>
            </div>

            <div class="section-title">Select Distribution Company</div>
            <div class="disco-grid" id="discoGrid">
                <div class="disco-btn selected" onclick="selectDisco('ikedc')" id="disco-ikedc">IKEDC</div>
                <div class="disco-btn" onclick="selectDisco('ekedc')" id="disco-ekedc">EKEDC</div>
                <div class="disco-btn" onclick="selectDisco('ibedc')" id="disco-ibedc">IBEDC</div>
                <div class="disco-btn" onclick="selectDisco('aedc')" id="disco-aedc">AEDC</div>
                <div class="disco-btn" onclick="selectDisco('phed')" id="disco-phed">PHED</div>
                <div class="disco-btn" onclick="selectDisco('kedco')" id="disco-kedco">KEDCO</div>
                <div class="disco-btn" onclick="selectDisco('kaedco')" id="disco-kaedco">KAEDCO</div>
                <div class="disco-btn" onclick="selectDisco('eedc')" id="disco-eedc">EEDC</div>
                <div class="disco-btn" onclick="selectDisco('bedc')" id="disco-bedc">BEDC</div>
                <div class="disco-btn" onclick="selectDisco('aba')" id="disco-aba">ABA</div>
                <div class="disco-btn" onclick="selectDisco('yedc')" id="disco-yedc">YEDC</div>
                <div class="disco-btn" onclick="selectDisco('jedc')" id="disco-jedc">JEDC</div>
            </div>

            <div class="meter-type">
                <div class="meter-option selected" onclick="selectMeterType('prepaid')" id="meter-prepaid">Prepaid</div>
                <div class="meter-option" onclick="selectMeterType('postpaid')" id="meter-postpaid">Postpaid</div>
            </div>

            <div class="input-field">
                <label>Meter Number</label>
                <input type="text" id="meterNumber" placeholder="Enter meter number" onblur="verifyMeter()">
            </div>

            <div class="customer-info" id="customerInfo">
                <p><span class="label">Customer Name:</span> <span id="customerName"></span></p>
                <p><span class="label">Address:</span> <span id="customerAddress"></span></p>
                <p><span class="label">Meter Type:</span> <span id="customerMeterType"></span></p>
            </div>

            <div class="input-field">
                <label>Amount (₦)</label>
                <input type="number" id="amount" placeholder="Enter amount" min="500">
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="payElectricity()" disabled>Pay Bill</button>
        </div>
    </div>

    <script>
        // Electricity profit margin
        const ELECTRICITY_PROFIT = 50;
        
        // Disco to service ID mapping
        const discoMap = {
            ikedc: 'ikeja-electric',
            ekedc: 'eko-electric',
            ibedc: 'ibadan-electric',
            aedc: 'abuja-electric',
            phed: 'phed',
            kedco: 'kano-electric',
            kaedco: 'kaduna-electric',
            eedc: 'enugu-electric',
            bedc: 'benin-electric',
            aba: 'aba-electric',
            yedc: 'yola-electric',
            jedc: 'jos-electric'
        };
        
        let currentDisco = 'ikedc';
        let meterType = 'prepaid';
        let verifiedData = null;
        let userBalance = 0;
        let selectedCost = 0;
        let selectedPrice = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            
            document.getElementById('amount').addEventListener('input', function() {
                const amount = parseInt(this.value);
                if (amount >= 500) {
                    selectedCost = amount;
                    selectedPrice = amount + ELECTRICITY_PROFIT;
                    updatePurchaseButton();
                } else {
                    selectedCost = 0;
                    selectedPrice = 0;
                    updatePurchaseButton();
                }
            });
        });

        function selectDisco(disco) {
            currentDisco = disco;
            document.querySelectorAll('.disco-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`disco-${disco}`).classList.add('selected');
            document.getElementById('customerInfo').style.display = 'none';
            verifiedData = null;
            updatePurchaseButton();
        }

        function selectMeterType(type) {
            meterType = type;
            document.querySelectorAll('.meter-option').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`meter-${type}`).classList.add('selected');
            document.getElementById('customerInfo').style.display = 'none';
            verifiedData = null;
        }

        async function verifyMeter() {
            const meterNumber = document.getElementById('meterNumber').value;
            
            if (!meterNumber || meterNumber.length < 6) {
                return;
            }

            try {
                // BIGISUB API CALL for meter verification
                const payload = {
                    service: discoMap[currentDisco],
                    meter_number: meterNumber,
                    meter_type: meterType
                };
                
                const result = await bigisubRequest('electricity/verify/', 'POST', payload);
                
                if (result.success && result.data) {
                    verifiedData = result.data;
                    document.getElementById('customerName').textContent = result.data.customer_name || 'N/A';
                    document.getElementById('customerAddress').textContent = result.data.address || 'N/A';
                    document.getElementById('customerMeterType').textContent = meterType.toUpperCase();
                    document.getElementById('customerInfo').style.display = 'block';
                } else {
                    document.getElementById('customerInfo').style.display = 'none';
                    showError('Meter verification failed');
                }
            } catch (error) {
                console.error('Verification failed:', error);
            }
            updatePurchaseButton();
        }

        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const meterNumber = document.getElementById('meterNumber').value;
            const amount = parseInt(document.getElementById('amount').value);
            
            if (meterNumber && meterNumber.length >= 6 && amount && amount >= 500 && verifiedData) {
                btn.disabled = false;
                btn.textContent = `Pay ₦${selectedPrice}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Enter all details';
            }
        }

        // Show messages
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = msg;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            const pendingDiv = document.getElementById('pendingMessage');
            pendingDiv.style.display = 'block';
            pendingDiv.textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        // Pay electricity - BIGISUB API CALL
        async function payElectricity() {
            const meterNumber = document.getElementById('meterNumber').value;
            
            if (!meterNumber) {
                showError('Please enter meter number');
                return;
            }
            
            if (!selectedCost || selectedCost < 500) {
                showError('Minimum amount is ₦500');
                return;
            }
            
            if (userBalance < selectedPrice) {
                showError('Insufficient balance. Please fund your wallet');
                return;
            }

            showPending('Processing payment...');

            try {
                // BIGISUB API CALL for electricity payment
                const payload = {
                    service: discoMap[currentDisco],
                    meter_number: meterNumber,
                    meter_type: meterType,
                    amount: selectedCost,
                    pin_code: BIGISUB_CONFIG.PIN_CODE
                };
                
                const result = await bigisubRequest('electricity/pay/', 'POST', payload);
                
                hidePending();
                
                if (result.success || result.status === 'success') {
                    // Success - deduct from user balance
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    // Show token if available
                    if (result.token) {
                        document.getElementById('tokenNumber').textContent = result.token;
                        document.getElementById('tokenDisplay').style.display = 'block';
                    }
                    
                    // Record transaction
                    const transaction = {
                        type: `${currentDisco.toUpperCase()} Electricity - ${meterType}`,
                        amount: `-₦${selectedPrice}`,
                        date: new Date().toLocaleString(),
                        meter: meterNumber
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Payment successful!`);
                    
                } else {
                    showError(result.message || result.error || 'Payment failed');
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }
    </script>
</body>
</html>
