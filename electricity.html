<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Similar styles as buy-data.html */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .container { max-width:500px; margin:0 auto; padding:15px; }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding:15px 0;
        }
        .back-btn { font-size:1.5rem; color:#0066cc; background:none; border:none; cursor:pointer; }
        .page-title { font-size:1.3rem; font-weight:bold; color:#0066cc; }
        
        .balance-card {
            background: linear-gradient(135deg, #0066cc, #004d99);
            color:white; padding:15px 20px; border-radius:12px;
            margin:15px 0; display:flex; justify-content:space-between;
        }
        .balance-value { font-size:1.5rem; font-weight:bold; }
        
        .disco-select {
            margin:20px 0;
        }
        select, input {
            width:100%; padding:15px; border:2px solid #e0e0e0;
            border-radius:10px; font-size:1rem; margin:10px 0;
        }
        
        .purchase-btn {
            width:100%; padding:18px; background:#0066cc; color:white;
            border:none; border-radius:12px; font-size:1.2rem;
            font-weight:bold; cursor:pointer; margin:20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button onclick="goBack()" class="back-btn">←</button>
            <div class="page-title">Electricity</div>
            <div style="width:30px;"></div>
        </div>

        <div class="balance-card">
            <span>Your Balance</span>
            <span class="balance-value" id="balanceDisplay">₦0.00</span>
        </div>

        <div class="disco-select">
            <label>Distribution Company</label>
            <select id="disco">
                <option value="ikeja-electric">Ikeja Electric</option>
                <option value="eko-electric">Eko Electric</option>
                <option value="abuja-electric">Abuja Electric</option>
                <option value="kano-electric">Kano Electric</option>
            </select>
        </div>

        <div class="input-group">
            <label>Meter Number</label>
            <input type="text" id="meterNumber" placeholder="Enter meter number">
        </div>

        <div class="input-group">
            <label>Amount (₦)</label>
            <input type="number" id="amount" placeholder="Enter amount" min="500">
        </div>

        <div>
            <label>Meter Type</label>
            <select id="meterType">
                <option value="prepaid">Prepaid</option>
                <option value="postpaid">Postpaid</option>
            </select>
        </div>

        <button class="purchase-btn" onclick="payElectricity()">Pay Electricity Bill</button>
    </div>

    <script>
        const VTPASS = {
            BASE_URL: 'https://api.vtpass.com/api',
            PUBLIC_KEY: 'YOUR_VTPASS_PUBLIC_KEY',
            SECRET_KEY: 'YOUR_VTPASS_SECRET_KEY'
        };

        let currentUser = { balance: 0 };

        document.addEventListener('DOMContentLoaded', function() {
            currentUser.balance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${currentUser.balance}`;
        });

        function goBack() { window.history.back(); }

        async function payElectricity() {
            const disco = document.getElementById('disco').value;
            const meterNumber = document.getElementById('meterNumber').value;
            const amount = parseInt(document.getElementById('amount').value);
            const meterType = document.getElementById('meterType').value;

            if (!meterNumber || meterNumber.length < 6) { alert('Valid meter number'); return; }
            if (!amount || amount < 500) { alert('Minimum ₦500'); return; }
            if (currentUser.balance < amount) { alert('Insufficient balance'); return; }

            showLoading('Processing payment...');

            try {
                const response = await fetch(`${VTPASS.BASE_URL}/pay`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'api-key': VTPASS.PUBLIC_KEY,
                        'secret-key': VTPASS.SECRET_KEY
                    },
                    body: JSON.stringify({
                        serviceID: disco,
                        billersCode: meterNumber,
                        variation_code: meterType,
                        amount: amount
                    })
                });

                const data = await response.json();

                if (data.code === '000') {
                    currentUser.balance -= amount;
                    localStorage.setItem('userBalance', currentUser.balance);
                    document.getElementById('balanceDisplay').textContent = `₦${currentUser.balance}`;
                    
                    addTransaction('Electricity', `-₦${amount}`, 'debit', '💡');
                    
                    hideLoading();
                    alert('✅ Electricity bill paid!');
                } else {
                    hideLoading();
                    alert(`❌ Failed: ${data.response_description}`);
                }
            } catch (error) {
                hideLoading();
                alert('Network error');
            }
        }

        function addTransaction(type, amount, className, icon) {
            let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                type, amount, date: new Date().toLocaleString(), icon
            });
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
        }

        function showLoading(msg) {
            const overlay = document.createElement('div');
            overlay.id = 'loading';
            overlay.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.9); display:flex; justify-content:center; align-items:center; z-index:9999;';
            overlay.innerHTML = `<div style="background:#0066cc; color:white; padding:20px; border-radius:10px;"><div style="width:30px; height:30px; border:3px solid white; border-top-color:transparent; border-radius:50%; animation:spin 1s infinite; margin:0 auto 10px;"></div><p>${msg}</p></div>`;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }
    </script>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
