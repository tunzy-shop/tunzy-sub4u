<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .disco-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .disco-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .disco-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .meter-type {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .meter-option {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .meter-option.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .input-field {
            margin: 20px 0;
        }

        .input-field input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Electricity</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <h3>Select Distribution Company</h3>
            <div class="disco-grid">
                <div class="disco-btn selected">IKEDC</div>
                <div class="disco-btn">EKEDC</div>
                <div class="disco-btn">AEDC</div>
                <div class="disco-btn">PHED</div>
            </div>

            <h3>Meter Type</h3>
            <div class="meter-type">
                <div class="meter-option selected">Prepaid</div>
                <div class="meter-option">Postpaid</div>
            </div>

            <div class="input-field">
                <input type="text" placeholder="Meter Number">
            </div>

            <div class="input-field">
                <input type="number" placeholder="Amount (₦)">
            </div>

            <button class="purchase-btn">Pay Bill</button>
        </div>
    </div>
</body>
</html>
