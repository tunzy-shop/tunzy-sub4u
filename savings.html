<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .savings-container {
            padding: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #0066cc, #004d99);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .savings-amount {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .interest-rate {
            font-size: 14px;
            opacity: 0.9;
        }

        .savings-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .option-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e0e0e0;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: #0066cc;
        }

        .option-icon {
            font-size: 30px;
            color: #0066cc;
            margin-bottom: 10px;
        }

        .option-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .option-desc {
            font-size: 12px;
            color: #666;
        }

        .recent-savings {
            margin-top: 20px;
        }

        .savings-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .savings-info h4 {
            font-size: 14px;
            margin-bottom: 3px;
        }

        .savings-info p {
            font-size: 12px;
            color: #666;
        }

        .savings-return {
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Savings</h1>
        </div>

        <div class="savings-container">
            <div class="balance-card">
                <div class="balance-label">Total Savings</div>
                <div class="savings-amount">₦0.00</div>
                <div class="interest-rate">5% annual interest</div>
            </div>

            <div class="savings-options">
                <div class="option-card" onclick="startSaving('daily')">
                    <div class="option-icon">📅</div>
                    <div class="option-title">Daily Save</div>
                    <div class="option-desc">Save daily</div>
                </div>
                <div class="option-card" onclick="startSaving('weekly')">
                    <div class="option-icon">📆</div>
                    <div class="option-title">Weekly Save</div>
                    <div class="option-desc">Save weekly</div>
                </div>
                <div class="option-card" onclick="startSaving('monthly')">
                    <div class="option-icon">📊</div>
                    <div class="option-title">Monthly Save</div>
                    <div class="option-desc">Save monthly</div>
                </div>
                <div class="option-card" onclick="startSaving('target')">
                    <div class="option-icon">🎯</div>
                    <div class="option-title">Target Save</div>
                    <div class="option-desc">Reach a goal</div>
                </div>
            </div>

            <div class="recent-savings">
                <h3 style="margin-bottom: 15px;">Recent Savings</h3>
                <div class="savings-item">
                    <div class="savings-info">
                        <h4>Daily Savings</h4>
                        <p>30 days streak</p>
                    </div>
                    <div class="savings-return">+₦1,500</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startSaving(type) {
            alert(`Start ${type} savings feature coming soon!`);
        }
    </script>
</body>
</html>
