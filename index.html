<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
        }

        .header {
            background: #0066cc;
            padding: 20px 20px 30px;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            overflow: hidden;
            border: 2px solid white;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-text {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .balance-section {
            background: white;
            margin: -20px 20px 0;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: 700;
            color: #0066cc;
        }

        .fund-button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: #e0e0e0;
            margin: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .service-item {
            background: white;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .service-item:hover {
            background: #f8f9fa;
        }

        .service-icon {
            font-size: 24px;
            margin-bottom: 10px;
            color: #0066cc;
        }

        .service-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .service-subtitle {
            font-size: 12px;
            color: #999;
        }

        .bottom-nav {
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #999;
            font-size: 12px;
        }

        .nav-item.active {
            color: #0066cc;
        }

        body {
            padding-bottom: 70px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <div class="logo-circle">
                    <img src="assets/my-logo.jpg" alt="TUNZY">
                </div>
                <div>☰</div>
            </div>
            <div class="welcome-text">Welcome back,</div>
            <div class="user-name" id="userDisplay">Loading...</div>
        </div>

        <!-- REAL BALANCE - NO FAKE NUMBERS -->
        <div class="balance-section">
            <div>
                <div class="balance-label">Wallet Balance</div>
                <div class="balance-amount" id="balanceDisplay">₦0.00</div>
            </div>
            <button class="fund-button" onclick="window.location.href='fund.html'">Fund</button>
        </div>

        <!-- SERVICES - Buy Data is first! -->
        <div class="services-grid">
            <a href="buy-data.html" class="service-item">
                <div class="service-icon">📱</div>
                <div class="service-title">Buy Data</div>
                <div class="service-subtitle">All networks</div>
            </a>
            <a href="airtime.html" class="service-item">
                <div class="service-icon">📞</div>
                <div class="service-title">Airtime</div>
                <div class="service-subtitle">Recharge</div>
            </a>
            <a href="tv.html" class="service-item">
                <div class="service-icon">📺</div>
                <div class="service-title">Cable TV</div>
                <div class="service-subtitle">DSTV, GOtv</div>
            </a>
            <a href="electricity.html" class="service-item">
                <div class="service-icon">💡</div>
                <div class="service-title">Electricity</div>
                <div class="service-subtitle">Prepaid</div>
            </a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">Home</a>
        <a href="services.html" class="nav-item">Services</a>
        <a href="history.html" class="nav-item">History</a>
        <a href="profile.html" class="nav-item">Profile</a>
    </div>

    <script>
        // Load REAL user data - NO FAKE STUFF
        document.addEventListener('DOMContentLoaded', function() {
            const userName = localStorage.getItem('userName');
            const balance = localStorage.getItem('userBalance');
            
            if (!userName) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userDisplay').textContent = userName;
            document.getElementById('balanceDisplay').textContent = `₦${parseFloat(balance || 0).toLocaleString()}.00`;
        });
    </script>
</body>
</html>
