<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <div class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="logo">🔵 TUNZY ADMIN</div>
            </div>
            
            <div class="admin-info">
                <div class="admin-avatar">👤</div>
                <div class="admin-details">
                    <div class="admin-name" id="adminName">Admin User</div>
                    <div class="admin-role">Super Administrator</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                    <span class="badge" id="userCount">0</span>
                </a>
                <a href="#" class="nav-item" data-page="transactions">
                    <i class="fas fa-credit-card"></i>
                    <span>Transactions</span>
                    <span class="badge" id="transactionCount">0</span>
                </a>
                <a href="#" class="nav-item" data-page="services">
                    <i class="fas fa-cog"></i>
                    <span>Services</span>
                </a>
                <a href="#" class="nav-item" data-page="api-settings">
                    <i class="fas fa-key"></i>
                    <span>API Settings</span>
                </a>
                <a href="#" class="nav-item" data-page="wallet">
                    <i class="fas fa-wallet"></i>
                    <span>Wallet Management</span>
                </a>
                <a href="#" class="nav-item" data-page="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" data-page="support">
                    <i class="fas fa-headset"></i>
                    <span>Support</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="admin-main">
            <!-- Top Bar -->
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="top-bar-right">
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>
                    <div class="date-time" id="currentDateTime"></div>
                </div>
            </div>

            <!-- Content Area - Different pages load here -->
            <div class="content-area" id="contentArea">
                <!-- Dashboard content will be loaded here -->
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
<!-- Add this function to admin.js or directly in admin-dashboard.html -->

<script>
    // Data Plans Management Functions
    function loadDataPlansManagement() {
        const content = document.getElementById('contentArea');
        content.innerHTML = `
            <div class="table-container">
                <div class="table-header">
                    <h2>Data Plans Management</h2>
                    <button class="btn btn-success" onclick="showAddPlanModal()">+ Add New Plan</button>
                </div>
                
                <!-- MTN Plans -->
                <div class="api-key-item">
                    <h3 style="color: #ffcc00;">📱 MTN Nigeria</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Plan Name</th>
                                <th>Price (₦)</th>
                                <th>Type</th>
                                <th>API Code</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="mtnPlansTable">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Glo Plans -->
                <div class="api-key-item">
                    <h3 style="color: #00a859;">📱 Glo</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Plan Name</th>
                                <th>Price (₦)</th>
                                <th>Type</th>
                                <th>API Code</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="gloPlansTable">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Airtel Plans -->
                <div class="api-key-item">
                    <h3 style="color: #e60000;">📱 Airtel</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Plan Name</th>
                                <th>Price (₦)</th>
                                <th>Type</th>
                                <th>API Code</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="airtelPlansTable">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 9mobile Plans -->
                <div class="api-key-item">
                    <h3 style="color: #00aeef;">📱 9mobile</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Plan Name</th>
                                <th>Price (₦)</th>
                                <th>Type</th>
                                <th>API Code</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="9mobilePlansTable">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        // Load all plans
        loadAllPlans();
    }
    
    function loadAllPlans() {
        // This would load from database
        // For now, using the dataPlans object
        const plans = window.dataPlans || {
            mtn: [
                { name: '100MB', price: 100, type: 'daily', apiCode: 'mtn-daily-100mb', status: 'active' },
                { name: '1GB', price: 500, type: 'monthly', apiCode: 'mtn-monthly-1gb', status: 'active' }
            ]
        };
        
        // Populate tables
        for (let network in plans) {
            const tableId = `${network}PlansTable`;
            const tbody = document.getElementById(tableId);
            if (tbody) {
                let html = '';
                plans[network].forEach(plan => {
                    html += `
                        <tr>
                            <td>${plan.name}</td>
                            <td>₦${plan.price}</td>
                            <td>${plan.type}</td>
                            <td><code>${plan.apiCode}</code></td>
                            <td><span class="status-badge status-active">Active</span></td>
                            <td>
                                <button class="btn btn-primary btn-small" onclick="editPlan('${network}', '${plan.id}')">Edit</button>
                                <button class="btn btn-danger btn-small" onclick="deletePlan('${network}', '${plan.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }
        }
    }
    
    function showAddPlanModal() {
        const network = prompt('Enter network (mtn/glo/airtel/9mobile):');
        if (!network) return;
        
        const name = prompt('Enter plan name (e.g., 1GB):');
        const price = prompt('Enter price (₦):');
        const type = prompt('Enter type (daily/weekly/monthly):');
        const apiCode = prompt('Enter API code:');
        
        if (name && price && type && apiCode) {
            alert(`✅ Plan added for ${network}`);
            // Here you would save to database
        }
    }
    
    function editPlan(network, planId) {
        alert(`Edit plan ${planId} for ${network}`);
    }
    
    function deletePlan(network, planId) {
        if (confirm(`Delete plan ${planId}?`)) {
            alert('Plan deleted');
        }
    }
</script>
