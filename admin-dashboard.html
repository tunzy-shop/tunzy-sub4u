<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 2rem;
            color: #0066cc;
            font-weight: bold;
        }
        .section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
        }
        .price-input {
            width: 80px;
            padding: 5px;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 0 2px;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🔵 TUNZY ADMIN DASHBOARD</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div>Total Users</div>
                <div class="stat-number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div>Today's Transactions</div>
                <div class="stat-number" id="todayTrans">0</div>
            </div>
            <div class="stat-card">
                <div>Total Revenue</div>
                <div class="stat-number" id="totalRevenue">₦0</div>
            </div>
            <div class="stat-card">
                <div>Active Services</div>
                <div class="stat-number">4</div>
            </div>
        </div>

        <!-- Users Section -->
        <div class="section">
            <h3>👥 Recent Users</h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Balance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>

        <!-- Price Management -->
        <div class="section">
            <h3>💰 Manage Data Prices</h3>
            <table>
                <thead>
                    <tr>
                        <th>Network</th>
                        <th>Plan</th>
                        <th>Current Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>MTN</td>
                        <td>1GB</td>
                        <td><input type="number" id="price-mtn-1gb" class="price-input" value="500"></td>
                        <td><button class="btn btn-primary" onclick="updatePrice('mtn-1gb')">Update</button></td>
                    </tr>
                    <tr>
                        <td>GLO</td>
                        <td>1GB</td>
                        <td><input type="number" id="price-glo-1gb" class="price-input" value="500"></td>
                        <td><button class="btn btn-primary" onclick="updatePrice('glo-1gb')">Update</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============================================
        // CHECK LOGIN - SIMPLE AND CLEAN
        // ============================================
        (function() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            console.log('Login status:', isLoggedIn);
            
            if (isLoggedIn !== 'true') {
                alert('Please login first!');
                window.location.replace('admin-login.html');
                return;
            }
        })();

        // ============================================
        // LOAD DASHBOARD DATA
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            loadStats();
        });

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const tbody = document.getElementById('usersBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No users yet</td></tr>';
                return;
            }
            
            let html = '';
            users.slice(0, 5).forEach(user => {
                html += `
                    <tr>
                        <td>${user.name || 'N/A'}</td>
                        <td>${user.email}</td>
                        <td>₦${user.balance || 0}</td>
                        <td><span style="color: green;">● Active</span></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function loadStats() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('todayTrans').textContent = transactions.length;
            
            const revenue = transactions
                .filter(t => t.amount && t.amount.includes('-'))
                .reduce((sum, t) => sum + (parseInt(t.amount.replace(/[^0-9]/g, '')) || 0), 0);
            
            document.getElementById('totalRevenue').textContent = `₦${revenue}`;
        }

        // ============================================
        // PRICE MANAGEMENT
        // ============================================
        function updatePrice(planId) {
            const input = document.getElementById(`price-${planId}`);
            const newPrice = input.value;
            
            if (!newPrice || newPrice < 50) {
                alert('Please enter a valid price (minimum ₦50)');
                return;
            }
            
            // Save to localStorage
            let prices = JSON.parse(localStorage.getItem('dataPrices')) || {};
            prices[planId] = parseInt(newPrice);
            localStorage.setItem('dataPrices', JSON.stringify(prices));
            
            alert(`✅ Price updated to ₦${newPrice}`);
        }

        // ============================================
        // LOGOUT - CLEAN AND SIMPLE
        // ============================================
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Clear ONLY admin login
                localStorage.removeItem('adminLoggedIn');
                
                // Force redirect
                window.location.href = 'admin-login.html';
            }
        }
    </script>
</body>
</html>
