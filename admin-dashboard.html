<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <div class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="logo">🔵 TUNZY ADMIN</div>
            </div>
            
            <div class="admin-info">
                <div class="admin-avatar">👤</div>
                <div class="admin-details">
                    <div class="admin-name" id="adminName">Admin User</div>
                    <div class="admin-role">Super Administrator</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                    <span class="badge" id="userCount">0</span>
                </a>
                <a href="#" class="nav-item" data-page="transactions">
                    <i class="fas fa-credit-card"></i>
                    <span>Transactions</span>
                    <span class="badge" id="transactionCount">0</span>
                </a>
                <a href="#" class="nav-item" data-page="services">
                    <i class="fas fa-cog"></i>
                    <span>Services</span>
                </a>
                <a href="#" class="nav-item" data-page="api-settings">
                    <i class="fas fa-key"></i>
                    <span>API Settings</span>
                </a>
                <a href="#" class="nav-item" data-page="wallet">
                    <i class="fas fa-wallet"></i>
                    <span>Wallet Management</span>
                </a>
                <a href="#" class="nav-item" data-page="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" data-page="support">
                    <i class="fas fa-headset"></i>
                    <span>Support</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="admin-main">
            <!-- Top Bar -->
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="top-bar-right">
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>
                    <div class="date-time" id="currentDateTime"></div>
                </div>
            </div>

            <!-- Content Area - Different pages load here -->
            <div class="content-area" id="contentArea">
                <!-- Dashboard content will be loaded here -->
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
