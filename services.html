<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .service-card {
            background: #f8f9fa;
            padding: 25px 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .service-card:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,102,204,0.1);
        }

        .service-title {
            font-weight: 600;
            color: #0066cc;
            margin-bottom: 5px;
        }

        .service-desc {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>All Services</h1>
        </div>

        <div class="services-grid">
            <a href="buy-data.html" class="service-card">
                <div class="service-title">DATA</div>
                <div class="service-desc">MTN, GLO, Airtel, 9mobile</div>
            </a>
            <a href="airtime.html" class="service-card">
                <div class="service-title">AIRTIME</div>
                <div class="service-desc">Recharge any network</div>
            </a>
            <a href="tv.html" class="service-card">
                <div class="service-title">CABLE TV</div>
                <div class="service-desc">DSTV, GOtv, Startimes</div>
            </a>
            <a href="electricity.html" class="service-card">
                <div class="service-title">ELECTRICITY</div>
                <div class="service-desc">Prepaid & Postpaid</div>
            </a>
            <a href="results.html" class="service-card">
                <div class="service-title">RESULTS</div>
                <div class="service-desc">WAEC, NECO, NABTEB</div>
            </a>
            <a href="education.html" class="service-card">
                <div class="service-title">EDUCATION</div>
                <div class="service-desc">School fees, PINs</div>
            </a>
        </div>
    </div>
</body>
</html>
