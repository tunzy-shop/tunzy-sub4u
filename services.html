<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: #e0e0e0;
            margin: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .service-item {
            background: white;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
        }

        .service-item:hover {
            background: #f8f9fa;
        }

        .service-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            background: #f0f0f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0066cc;
        }

        .service-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .service-subtitle {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>All Services</h1>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="location.href='buy-data.html'">
                <div class="service-icon">📱</div>
                <div class="service-title">Data Bundle</div>
                <div class="service-subtitle">All networks</div>
            </div>
            <div class="service-item" onclick="location.href='airtime.html'">
                <div class="service-icon">📞</div>
                <div class="service-title">Airtime</div>
                <div class="service-subtitle">Recharge</div>
            </div>
            <div class="service-item" onclick="location.href='tv.html'">
                <div class="service-icon">📺</div>
                <div class="service-title">Cable TV</div>
                <div class="service-subtitle">DSTV, GOtv</div>
            </div>
            <div class="service-item" onclick="location.href='electricity.html'">
                <div class="service-icon">💡</div>
                <div class="service-title">Electricity</div>
                <div class="service-subtitle">Prepaid</div>
            </div>
            <div class="service-item" onclick="location.href='results.html'">
                <div class="service-icon">📊</div>
                <div class="service-title">Results</div>
                <div class="service-subtitle">WAEC, NECO</div>
            </div>
            <div class="service-item" onclick="location.href='education.html'">
                <div class="service-icon">🎓</div>
                <div class="service-title">Education</div>
                <div class="service-subtitle">School fees</div>
            </div>
        </div>
    </div>
</body>
</html>
