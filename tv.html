
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cable TV - TUNZY SUB 4 YOU</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .provider-tabs {
    display: flex;
    gap: 10px;
    padding: 0 16px;
    flex-wrap: wrap;
  }
  .provider-tab {
    flex: 1;
    min-width: 90px;
    padding: 12px 8px;
    background: #f0f4f8;
    border: 2px solid #d0d8e4;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    color: #333;
    transition: all 0.2s;
  }
  .provider-tab:hover  { border-color: #0066cc; color: #0066cc; }
  .provider-tab.active { background: #0066cc; color: white; border-color: #0066cc; }

  .customer-info-box {
    margin: 0 16px;
    background: #ddeeff;
    border-left: 4px solid #0066cc;
    border-radius: 10px;
    padding: 12px 16px;
    display: none;
    font-size: 14px;
  }
  .customer-info-box p { margin: 4px 0; color: #333; }
  .customer-info-box strong { color: #0066cc; }
</style>
</head>
<body>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <div class="spinner-text">Processing subscription…</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-overlay" id="toastOverlay">
  <div class="toast-box">
    <div class="toast-icon" id="toastIcon">✅</div>
    <div class="toast-title" id="toastTitle">Success!</div>
    <div class="toast-msg" id="toastMsg"></div>
    <button class="toast-btn" id="toastBtn" onclick="closeToast()">OK</button>
  </div>
</div>

<div class="app-container">

  <div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Cable TV</h1>
  </div>

  <div class="balance-info" style="margin-top:14px;">
    <span>💰 Your Balance</span>
    <span id="balanceDisplay">₦0.00</span>
  </div>

  <div class="section-title">Select Provider</div>
  <div class="provider-tabs" id="providerTabs"></div>

  <div class="phone-input" style="margin-top:16px;">
    <label>📟 Smart Card / IUC Number</label>
    <input type="text" id="cardNumber" placeholder="Enter smart card number">
  </div>

  <div class="customer-info-box" id="customerInfo">
    <p><strong>Customer:</strong> <span id="customerName">—</span></p>
  </div>

  <div class="section-title" style="margin-top:14px;">Select Package</div>
  <div class="plans-grid" id="plansContainer"></div>

  <button class="purchase-btn" id="purchaseBtn" onclick="subscribeTV()" disabled>
    Select a package
  </button>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
  <a href="history.html"   class="nav-item"><span class="nav-icon">🕐</span>History</a>
  <a href="buy-data.html"  class="nav-item"><span class="nav-icon">📶</span>Data</a>
  <a href="support.html"   class="nav-item"><span class="nav-icon">🎧</span>Support</a>
  <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script src="js/bigisub-config.js"></script>
<script>

const tvProviders = [
  { id: 'dstv',     name: 'DSTV',     serviceId: 'dstv' },
  { id: 'gotv',     name: 'GOtv',     serviceId: 'gotv' },
  { id: 'startimes',name: 'StarTimes',serviceId: 'startimes' },
  { id: 'showmax',  name: 'Showmax',  serviceId: 'showmax' }
];

const tvPackages = {
  dstv: [
    { name: 'Premium',  cost: 24000, price: 24500 },
    { name: 'Compact+', cost: 15000, price: 15400 },
    { name: 'Compact',  cost: 10000, price: 10300 },
    { name: 'Confam',   cost: 6000,  price: 6200  },
    { name: 'Yanga',    cost: 3600,  price: 3750  },
    { name: 'Padi',     cost: 2400,  price: 2550  }
  ],
  gotv: [
    { name: 'Max',     cost: 5000, price: 5200 },
    { name: 'Jolli',   cost: 3000, price: 3150 },
    { name: 'Jinja',   cost: 2000, price: 2100 },
    { name: 'Smallie', cost: 1500, price: 1600 }
  ],
  startimes: [
    { name: 'Nova',  cost: 2500, price: 2650 },
    { name: 'Basic', cost: 3500, price: 3650 },
    { name: 'Smart', cost: 5000, price: 5200 },
    { name: 'Super', cost: 7500, price: 7700 }
  ],
  showmax: [
    { name: 'Mobile',   cost: 1200, price: 1350 },
    { name: 'Standard', cost: 2500, price: 2650 },
    { name: 'Premium',  cost: 4500, price: 4700 }
  ]
};

let currentProvider = 'dstv';
let selectedPackage = null;
let selectedCost    = 0;
let selectedPrice   = 0;
let userBalance     = 0;

document.addEventListener('DOMContentLoaded', () => {
  userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
  document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';
  loadProviders();
  loadPackages();

  document.getElementById('cardNumber').addEventListener('input', checkBtn);
});

function loadProviders() {
  document.getElementById('providerTabs').innerHTML = tvProviders.map(p => `
    <div class="provider-tab ${p.id === 'dstv' ? 'active' : ''}"
         onclick="switchProvider('${p.id}', this)">${p.name}</div>
  `).join('');
}

function switchProvider(id, el) {
  currentProvider = id;
  document.querySelectorAll('.provider-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  resetSelection();
  loadPackages();
  document.getElementById('customerInfo').style.display = 'none';
}

function loadPackages() {
  const pkgs = tvPackages[currentProvider] || [];
  document.getElementById('plansContainer').innerHTML = pkgs.map(pkg => `
    <div class="plan-card" onclick="selectPackage('${pkg.name}', ${pkg.cost}, ${pkg.price}, this)">
      <div class="plan-name">${pkg.name}</div>
      <div class="plan-price">₦${pkg.price.toLocaleString()}</div>
    </div>
  `).join('');
}

function selectPackage(name, cost, price, el) {
  selectedPackage = name;
  selectedCost    = cost;
  selectedPrice   = price;
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  checkBtn();
}

function resetSelection() {
  selectedPackage = null;
  selectedCost    = 0;
  selectedPrice   = 0;
  const btn = document.getElementById('purchaseBtn');
  btn.disabled    = true;
  btn.textContent = 'Select a package';
}

function checkBtn() {
  const card = document.getElementById('cardNumber').value.trim();
  const btn  = document.getElementById('purchaseBtn');
  if (selectedPackage && card.length >= 6) {
    btn.disabled    = false;
    btn.textContent = `Pay ₦${selectedPrice.toLocaleString()} – ${selectedPackage}`;
  } else {
    btn.disabled    = true;
    btn.textContent = selectedPackage ? 'Enter smart card number' : 'Select a package';
  }
}

// ── TOAST ────────────────────────────────────────────────
function showToast(type, title, msg) {
  const map = {
    success: { icon: '✅', btnClass: '',           btnText: 'OK' },
    error:   { icon: '❌', btnClass: 'error-btn',  btnText: 'Close' },
    pending: { icon: '⏳', btnClass: 'pending-btn',btnText: 'OK' }
  };
  const cfg = map[type] || map.success;
  document.getElementById('toastIcon').textContent  = cfg.icon;
  document.getElementById('toastIcon').className    = `toast-icon ${type}`;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent   = msg;
  const btn = document.getElementById('toastBtn');
  btn.className   = `toast-btn ${cfg.btnClass}`;
  btn.textContent = cfg.btnText;
  document.getElementById('toastOverlay').classList.add('show');
}
function closeToast() { document.getElementById('toastOverlay').classList.remove('show'); }
function showSpinner() { document.getElementById('spinnerOverlay').classList.add('show'); }
function hideSpinner() { document.getElementById('spinnerOverlay').classList.remove('show'); }

// ── SUBSCRIBE ────────────────────────────────────────────
async function subscribeTV() {
  const card = document.getElementById('cardNumber').value.trim();

  if (!selectedPackage) {
    showToast('error', 'No Package', 'Please select a TV package first.');
    return;
  }
  if (!card || card.length < 6) {
    showToast('error', 'Invalid Card', 'Please enter a valid smart card / IUC number.');
    return;
  }
  if (userBalance < selectedPrice) {
    showToast('error', 'Insufficient Balance',
      `Your balance ₦${userBalance.toLocaleString()} is not enough. Please fund your wallet.`);
    return;
  }

  showSpinner();

  try {
    const payload = {
      service:     currentProvider,
      card_number: card,
      package:     selectedPackage,
      amount:      selectedCost,
      pin_code:    BIGISUB_CONFIG.PIN_CODE
    };

    const result = await bigisubRequest('tv/subscribe/', 'POST', payload);
    hideSpinner();

    if (result.success || result.status === 'success') {
      userBalance -= selectedPrice;
      localStorage.setItem('userBalance', userBalance);
      document.getElementById('balanceDisplay').textContent = '₦' + userBalance.toLocaleString() + '.00';

      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      txs.unshift({
        type:   `${currentProvider.toUpperCase()} TV – ${selectedPackage}`,
        amount: `-₦${selectedPrice.toLocaleString()}`,
        date:   new Date().toLocaleString()
      });
      localStorage.setItem('transactions', JSON.stringify(txs.slice(0, 50)));

      showToast('success', 'Subscription Successful! 📺',
        `${currentProvider.toUpperCase()} ${selectedPackage} has been activated on card ${card}.`);

      resetSelection();
      document.getElementById('cardNumber').value = '';
      document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));

    } else {
      showToast('error', 'Subscription Failed',
        result.message || result.error || 'Something went wrong. Please try again.');
    }

  } catch (err) {
    hideSpinner();
    showToast('error', 'Network Error', 'Could not reach the server. Check your internet and try again.');
    console.error(err);
  }
}
</script>
</body>
</html>
