<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable TV - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .provider-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .provider-tab {
            flex: 1;
            min-width: 100px;
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .provider-tab:hover {
            border-color: #0066cc;
        }

        .provider-tab.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .input-field {
            margin: 20px 0;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .input-field input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-field input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .customer-info {
            background: #e6f0ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #0066cc;
            display: none;
        }

        .customer-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .customer-info .label {
            font-weight: 600;
            color: #0066cc;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .plan-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
        }

        .plan-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .plan-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .plan-price {
            color: #0066cc;
            font-weight: 700;
            font-size: 18px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/bigisub-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Cable TV</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>

            <div class="section-title">Select Provider</div>
            <div class="provider-tabs" id="providerTabs"></div>

            <div class="input-field">
                <label>Smart Card / IUC Number</label>
                <input type="text" id="cardNumber" placeholder="Enter card number">
            </div>

            <div class="customer-info" id="customerInfo">
                <p><span class="label">Customer Name:</span> <span id="customerName"></span></p>
            </div>

            <div class="section-title">Select Package</div>
            <div class="plans-grid" id="plansContainer"></div>

            <button class="purchase-btn" id="purchaseBtn" onclick="subscribeTV()" disabled>Select a package</button>
        </div>
    </div>

    <script>
        // TV Providers and their packages
        const tvProviders = [
            { id: 'dstv', name: 'DSTV', serviceId: 'dstv' },
            { id: 'gotv', name: 'GOtv', serviceId: 'gotv' },
            { id: 'startimes', name: 'Startimes', serviceId: 'startimes' },
            { id: 'showmax', name: 'Showmax', serviceId: 'showmax' }
        ];
        
        // TV Packages with costs and selling prices
        const tvPackages = {
            dstv: [
                { name: 'Premium', cost: 24000, sellingPrice: 24500 },
                { name: 'Compact+', cost: 15000, sellingPrice: 15400 },
                { name: 'Compact', cost: 10000, sellingPrice: 10300 },
                { name: 'Confam', cost: 6000, sellingPrice: 6200 },
                { name: 'Yanga', cost: 3600, sellingPrice: 3750 }
            ],
            gotv: [
                { name: 'Max', cost: 5000, sellingPrice: 5200 },
                { name: 'Jolli', cost: 3000, sellingPrice: 3150 },
                { name: 'Jinja', cost: 2000, sellingPrice: 2100 },
                { name: 'Smallie', cost: 1500, sellingPrice: 1600 }
            ],
            startimes: [
                { name: 'Nova', cost: 2500, sellingPrice: 2650 },
                { name: 'Basic', cost: 3500, sellingPrice: 3650 },
                { name: 'Smart', cost: 5000, sellingPrice: 5200 },
                { name: 'Super', cost: 7500, sellingPrice: 7700 }
            ],
            showmax: [
                { name: 'Mobile', cost: 1200, sellingPrice: 1350 },
                { name: 'Standard', cost: 2500, sellingPrice: 2650 },
                { name: 'Premium', cost: 4500, sellingPrice: 4700 }
            ]
        };
        
        let currentProvider = 'dstv';
        let selectedPackage = null;
        let selectedCost = 0;
        let selectedPrice = 0;
        let userBalance = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            loadProviders();
            loadPackages();
        });

        // Load provider tabs
        function loadProviders() {
            const container = document.getElementById('providerTabs');
            let html = '';
            tvProviders.forEach(prov => {
                html += `<div class="provider-tab ${prov.id === 'dstv' ? 'active' : ''}" onclick="switchProvider('${prov.id}')">${prov.name}</div>`;
            });
            container.innerHTML = html;
        }

        // Switch provider
        function switchProvider(provider) {
            currentProvider = provider;
            document.querySelectorAll('.provider-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            loadPackages();
            selectedPackage = null;
            document.getElementById('purchaseBtn').disabled = true;
            document.getElementById('purchaseBtn').textContent = 'Select a package';
        }

        // Load packages for selected provider
        function loadPackages() {
            const container = document.getElementById('plansContainer');
            const packages = tvPackages[currentProvider];
            
            let html = '';
            packages.forEach(pkg => {
                html += `
                    <div class="plan-card" onclick="selectPackage('${pkg.name}', ${pkg.cost}, ${pkg.sellingPrice})">
                        <div class="plan-name">${pkg.name}</div>
                        <div class="plan-price">₦${pkg.sellingPrice}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Select package
        function selectPackage(name, cost, price) {
            selectedPackage = name;
            selectedCost = cost;
            selectedPrice = price;
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            document.getElementById('purchaseBtn').disabled = false;
            document.getElementById('purchaseBtn').textContent = `Pay ₦${price} for ${name}`;
        }

        // Show messages
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = msg;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            const pendingDiv = document.getElementById('pendingMessage');
            pendingDiv.style.display = 'block';
            pendingDiv.textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        // Subscribe to TV - BIGISUB API CALL
        async function subscribeTV() {
            const cardNumber = document.getElementById('cardNumber').value;
            
            if (!selectedPackage) {
                showError('Please select a package');
                return;
            }
            
            if (!cardNumber || cardNumber.length < 6) {
                showError('Please enter a valid smart card number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                showError('Insufficient balance. Please fund your wallet');
                return;
            }

            showPending('Processing subscription...');

            try {
                // BIGISUB API CALL for TV subscription
                const payload = {
                    service: currentProvider,
                    card_number: cardNumber,
                    package: selectedPackage,
                    amount: selectedCost,
                    pin_code: BIGISUB_CONFIG.PIN_CODE
                };
                
                const result = await bigisubRequest('tv/subscribe/', 'POST', payload);
                
                hidePending();
                
                if (result.success || result.status === 'success') {
                    // Success - deduct from user balance
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    // Record transaction
                    const transaction = {
                        type: `${currentProvider.toUpperCase()} - ${selectedPackage}`,
                        amount: `-₦${selectedPrice}`,
                        date: new Date().toLocaleString(),
                        card: cardNumber
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ${selectedPackage} subscribed on ${cardNumber}`);
                    
                    // Reset selection
                    selectedPackage = null;
                    document.getElementById('purchaseBtn').disabled = true;
                    document.getElementById('purchaseBtn').textContent = 'Select a package';
                    document.querySelectorAll('.plan-card').forEach(card => {
                        card.classList.remove('selected');
                    });
                    
                } else {
                    showError(result.message || result.error || 'Subscription failed');
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }

        // Card input listener
        document.getElementById('cardNumber').addEventListener('input', function() {
            if (selectedPackage && this.value.length >= 6) {
                document.getElementById('purchaseBtn').disabled = false;
            } else if (selectedPackage) {
                document.getElementById('purchaseBtn').disabled = true;
            }
        });
    </script>
</body>
</html>
