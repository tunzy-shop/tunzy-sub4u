<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable TV - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .provider-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 15px 0;
        }

        .provider-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .provider-btn:hover {
            border-color: #0066cc;
        }

        .provider-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .input-field {
            margin: 20px 0;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .input-field input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-field input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .customer-info {
            background: #e6f0ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #0066cc;
            display: none;
        }

        .customer-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .customer-info .label {
            font-weight: 600;
            color: #0066cc;
        }

        .package-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .package-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .package-card:hover {
            border-color: #0066cc;
        }

        .package-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .package-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .package-price {
            color: #0066cc;
            font-weight: 700;
            font-size: 18px;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/vtpass-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Cable TV</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>

            <div class="section-title">Select Provider</div>
            <div class="provider-grid">
                <div class="provider-btn selected" onclick="selectProvider('dstv')" id="prov-dstv">DSTV</div>
                <div class="provider-btn" onclick="selectProvider('gotv')" id="prov-gotv">GOtv</div>
                <div class="provider-btn" onclick="selectProvider('startimes')" id="prov-startimes">Startimes</div>
                <div class="provider-btn" onclick="selectProvider('showmax')" id="prov-showmax">Showmax</div>
            </div>

            <div class="input-field">
                <label>Smart Card / IUC Number</label>
                <input type="text" id="cardNumber" placeholder="Enter card number" onblur="verifyCard()">
            </div>

            <div class="customer-info" id="customerInfo">
                <p><span class="label">Customer Name:</span> <span id="customerName"></span></p>
            </div>

            <div class="section-title">Select Package</div>
            <div class="package-grid" id="packagesContainer">
                <!-- Packages loaded by JavaScript -->
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="subscribeTV()" disabled>Select a package</button>
        </div>
    </div>

    <script>
        const providerServiceMap = {
            'dstv': VTPASS_CONFIG.services.DSTV,
            'gotv': VTPASS_CONFIG.services.GOTV,
            'startimes': VTPASS_CONFIG.services.STARTIMES,
            'showmax': VTPASS_CONFIG.services.SHOWMAX
        };

        const packages = {
            dstv: [
                { code: 'dstv-premier', name: 'Premium', cost: 24000, sellingPrice: calculateTVPrice(24000) },
                { code: 'dstv-compact-plus', name: 'Compact+', cost: 15000, sellingPrice: calculateTVPrice(15000) },
                { code: 'dstv-compact', name: 'Compact', cost: 10000, sellingPrice: calculateTVPrice(10000) },
                { code: 'dstv-confam', name: 'Confam', cost: 6000, sellingPrice: calculateTVPrice(6000) }
            ],
            gotv: [
                { code: 'gotv-max', name: 'Max', cost: 5000, sellingPrice: calculateTVPrice(5000) },
                { code: 'gotv-jolli', name: 'Jolli', cost: 3000, sellingPrice: calculateTVPrice(3000) },
                { code: 'gotv-jinja', name: 'Jinja', cost: 2000, sellingPrice: calculateTVPrice(2000) },
                { code: 'gotv-smallie', name: 'Smallie', cost: 1500, sellingPrice: calculateTVPrice(1500) }
            ],
            startimes: [
                { code: 'startimes-nova', name: 'Nova', cost: 2500, sellingPrice: calculateTVPrice(2500) },
                { code: 'startimes-basic', name: 'Basic', cost: 3500, sellingPrice: calculateTVPrice(3500) },
                { code: 'startimes-smart', name: 'Smart', cost: 5000, sellingPrice: calculateTVPrice(5000) },
                { code: 'startimes-super', name: 'Super', cost: 7500, sellingPrice: calculateTVPrice(7500) }
            ],
            showmax: [
                { code: 'showmax-mobile', name: 'Mobile', cost: 1200, sellingPrice: calculateTVPrice(1200) },
                { code: 'showmax-standard', name: 'Standard', cost: 2500, sellingPrice: calculateTVPrice(2500) },
                { code: 'showmax-premium', name: 'Premium', cost: 4500, sellingPrice: calculateTVPrice(4500) }
            ]
        };

        let currentProvider = 'dstv';
        let selectedPackage = null;
        let selectedCode = '';
        let selectedCost = 0;
        let selectedPrice = 0;
        let userBalance = 0;
        let verifiedName = '';

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            loadPackages('dstv');
        });

        function selectProvider(provider) {
            currentProvider = provider;
            document.querySelectorAll('.provider-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`prov-${provider}`).classList.add('selected');
            loadPackages(provider);
            document.getElementById('customerInfo').style.display = 'none';
            selectedPackage = null;
            updatePurchaseButton();
        }

        function loadPackages(provider) {
            const container = document.getElementById('packagesContainer');
            const providerPackages = packages[provider];
            
            let html = '';
            providerPackages.forEach(pkg => {
                html += `
                    <div class="package-card" onclick="selectPackage('${pkg.code}', '${pkg.name}', ${pkg.cost}, ${pkg.sellingPrice})">
                        <div class="package-name">${pkg.name}</div>
                        <div class="package-price">₦${pkg.sellingPrice}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function selectPackage(code, name, cost, price) {
            selectedCode = code;
            selectedPackage = name;
            selectedCost = cost;
            selectedPrice = price;
            
            document.querySelectorAll('.package-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePurchaseButton();
        }

        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const cardNumber = document.getElementById('cardNumber').value;
            
            if (selectedPackage && cardNumber.length >= 6) {
                btn.disabled = false;
                btn.textContent = `Pay ₦${selectedPrice} for ${selectedPackage}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Select a package';
            }
        }

        async function verifyCard() {
            const cardNumber = document.getElementById('cardNumber').value;
            
            if (!cardNumber || cardNumber.length < 6) {
                return;
            }

            try {
                const result = await verifyMeter(
                    providerServiceMap[currentProvider],
                    cardNumber,
                    'verify'
                );

                if (result.success) {
                    verifiedName = result.data.Customer_Name || 'Verified Customer';
                    document.getElementById('customerName').textContent = verifiedName;
                    document.getElementById('customerInfo').style.display = 'block';
                    updatePurchaseButton();
                } else {
                    document.getElementById('customerInfo').style.display = 'none';
                }
            } catch (error) {
                console.error('Verification failed:', error);
            }
        }

        function showError(msg) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            document.getElementById('pendingMessage').style.display = 'block';
            document.getElementById('pendingMessage').textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        async function subscribeTV() {
            const cardNumber = document.getElementById('cardNumber').value;
            
            if (!selectedPackage) {
                showError('Please select a package');
                return;
            }
            
            if (!cardNumber || cardNumber.length < 6) {
                showError('Please enter a valid card number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                showError('Insufficient balance');
                return;
            }

            showPending('Processing subscription...');

            try {
                const payload = {
                    serviceID: providerServiceMap[currentProvider],
                    billersCode: cardNumber,
                    variation_code: selectedCode,
                    amount: selectedCost,
                    phone: localStorage.getItem('userPhone') || '08012345678'
                };
                
                const result = await vtpassApiCall('/pay', payload);
                const response = result.handled;
                
                hidePending();
                
                if (response.isSuccess && result.content?.transactions?.status === 'delivered') {
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    recordProfit(
                        `${currentProvider.toUpperCase()} - ${selectedPackage}`,
                        selectedCost,
                        selectedPrice,
                        `Card: ${cardNumber}`
                    );
                    
                    const transaction = {
                        type: `${currentProvider.toUpperCase()} - ${selectedPackage}`,
                        amount: `-₦${selectedPrice}`,
                        date: new Date().toLocaleString(),
                        card: cardNumber
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ${selectedPackage} subscribed on ${cardNumber}`);
                    
                    selectedPackage = null;
                    updatePurchaseButton();
                    
                } else if (response.isPending) {
                    showPending('Subscription processing. Please wait...');
                } else {
                    showError(response.message);
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }

        document.getElementById('cardNumber').addEventListener('input', updatePurchaseButton);
    </script>
</body>
</html>
