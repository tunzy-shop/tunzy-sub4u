<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable TV - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .provider-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .provider-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .provider-btn:hover {
            border-color: #0066cc;
        }

        .provider-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .input-field {
            margin: 20px 0;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .package-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .package-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .package-card:hover {
            border-color: #0066cc;
        }

        .package-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .package-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .package-price {
            color: #0066cc;
            font-weight: 600;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Cable TV</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="provider-grid">
                <div class="provider-btn selected" onclick="selectProvider('dstv')">DSTV</div>
                <div class="provider-btn" onclick="selectProvider('gotv')">GOtv</div>
                <div class="provider-btn" onclick="selectProvider('startimes')">Startimes</div>
                <div class="provider-btn" onclick="selectProvider('showmax')">Showmax</div>
            </div>

            <div class="input-field">
                <label>Smart Card / IUC Number</label>
                <input type="text" id="cardNumber" placeholder="Enter card number">
            </div>

            <div class="package-grid" id="packagesContainer">
                <!-- Packages loaded by JavaScript -->
            </div>

            <button class="purchase-btn" onclick="subscribeTV()">Subscribe Now</button>
        </div>
    </div>

    <script>
        const packages = {
            dstv: [
                { name: 'Premium', price: 24000 },
                { name: 'Compact+', price: 15000 },
                { name: 'Compact', price: 10000 },
                { name: 'Confam', price: 6000 }
            ],
            gotv: [
                { name: 'Max', price: 5000 },
                { name: 'Jolli', price: 3000 },
                { name: 'Jinja', price: 2000 },
                { name: 'Smallie', price: 1500 }
            ],
            startimes: [
                { name: 'Nova', price: 2500 },
                { name: 'Basic', price: 3500 },
                { name: 'Smart', price: 5000 },
                { name: 'Super', price: 7500 }
            ],
            showmax: [
                { name: 'Mobile', price: 1200 },
                { name: 'Standard', price: 2500 },
                { name: 'Premium', price: 4500 }
            ]
        };

        let currentProvider = 'dstv';
        let selectedPackage = null;
        let selectedPrice = 0;
        let userBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            loadPackages('dstv');
        });

        function selectProvider(provider) {
            currentProvider = provider;
            document.querySelectorAll('.provider-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            loadPackages(provider);
            selectedPackage = null;
        }

        function loadPackages(provider) {
            const container = document.getElementById('packagesContainer');
            const providerPackages = packages[provider];
            
            let html = '';
            providerPackages.forEach(pkg => {
                html += `
                    <div class="package-card" onclick="selectPackage('${pkg.name}', ${pkg.price})">
                        <div class="package-name">${pkg.name}</div>
                        <div class="package-price">₦${pkg.price}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function selectPackage(name, price) {
            selectedPackage = name;
            selectedPrice = price;
            
            document.querySelectorAll('.package-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function subscribeTV() {
            const cardNumber = document.getElementById('cardNumber').value;
            
            if (!selectedPackage) {
                alert('Please select a package');
                return;
            }
            
            if (!cardNumber) {
                alert('Please enter your card number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                alert('Insufficient balance');
                return;
            }
            
            userBalance -= selectedPrice;
            localStorage.setItem('userBalance', userBalance);
            
            const transaction = {
                type: `${currentProvider.toUpperCase()} - ${selectedPackage}`,
                amount: `-₦${selectedPrice}`,
                date: new Date().toLocaleString()
            };
            
            let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
            
            alert(`✅ Success! ${selectedPackage} subscribed on ${cardNumber}`);
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
        }
    </script>
</body>
</html>
