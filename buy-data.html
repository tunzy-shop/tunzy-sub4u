// ── STATE ────────────────────────────────────────────────
let currentNetwork  = 'mtn';
let currentCategory = 'All';
let selectedPlan    = null;
let selectedPlanId  = null;
let selectedPrice   = 0;
let userBalance     = 0;

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
  document.getElementById('balanceDisplay').textContent =
    '₦' + userBalance.toLocaleString() + '.00';

  loadNetworks();
  loadCategories();
  loadPlans();

  document.getElementById('phoneNumber').addEventListener('input', function () {
    checkBtn();
  });
});

// ── NETWORKS ─────────────────────────────────────────────
function loadNetworks() {
  const c = document.getElementById('networkTabs');
  c.innerHTML = Object.entries(networkMap).map(([key, net]) => `
    <div class="network-tab ${key === 'mtn' ? 'active' : ''}"
         onclick="switchNetwork('${key}', this)">
      <div class="network-logo-box">
        <img src="${net.image}" alt="${net.name}"
             onerror="this.style.display='none';this.parentNode.innerHTML='<span style=font-weight:800;font-size:18px;color:#0066cc>${net.name[0]}</span>'">
      </div>
      <span class="network-name">${net.name}</span>
    </div>
  `).join('');
}

function switchNetwork(network, el) {
  currentNetwork  = network;
  currentCategory = 'All';
  document.querySelectorAll('.network-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  resetSelection();
  loadCategories();
  loadPlans();
}

// ── CATEGORIES ───────────────────────────────────────────
function loadCategories() {
  const cats = networkMap[currentNetwork].categories;
  const c    = document.getElementById('categoryTabs');
  const title = document.getElementById('dataTypeTitle');

  if (cats.length <= 1) {
    c.innerHTML = '';
    title.style.display = 'none';
    return;
  }

  title.style.display = 'block';
  c.innerHTML = cats.map(cat => `
    <span class="category-tab ${cat === 'All' ? 'active' : ''}"
          onclick="switchCategory('${cat}', this)">${cat}</span>
  `).join('');
}

function switchCategory(category, el) {
  currentCategory = category;
  document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  resetSelection();
  loadPlans();
}

// ── PLANS ────────────────────────────────────────────────
function loadPlans() {
  const c      = document.getElementById('plansContainer');
  const title  = document.getElementById('plansTitle');
  const all    = dataPlans[currentNetwork] || [];
  const filtered = currentCategory === 'All'
    ? all
    : all.filter(p => p.type === currentCategory);

  if (filtered.length === 0) {
    title.style.display = 'none';
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No plans available for this category</p></div>';
    return;
  }

  title.style.display = 'block';
  c.innerHTML = filtered.map(plan => {
    const price = plan.cost + YOUR_PROFIT;
    return `
      <div class="plan-card" onclick="selectPlan(${plan.id}, '${plan.name}', ${price}, this)">
        <div class="plan-name">${plan.name}</div>
        <div class="plan-price">₦${price.toLocaleString()}</div>
        <div class="plan-validity">⏱ ${plan.validity}</div>
      </div>
    `;
  }).join('');
}

// ── SELECT PLAN ──────────────────────────────────────────
function selectPlan(id, name, price, el) {
  selectedPlanId = id;
  selectedPlan   = name;
  selectedPrice  = price;
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  checkBtn();
}

function resetSelection() {
  selectedPlanId = null;
  selectedPlan   = null;
  selectedPrice  = 0;
  const btn = document.getElementById('purchaseBtn');
  btn.disabled    = true;
  btn.textContent = 'Select a plan';
}

function checkBtn() {
  const phone = document.getElementById('phoneNumber').value;
  const btn   = document.getElementById('purchaseBtn');
  if (selectedPlanId && phone.length >= 11) {
    btn.disabled    = false;
    btn.textContent = `Pay ₦${selectedPrice.toLocaleString()} for ${selectedPlan}`;
  } else {
    btn.disabled    = true;
    btn.textContent = selectedPlan
      ? 'Enter phone number'
      : 'Select a plan';
  }
}

// ── TOAST ────────────────────────────────────────────────
function showToast(type, title, msg) {
  const overlay = document.getElementById('toastOverlay');
  const icon    = document.getElementById('toastIcon');
  const ttl     = document.getElementById('toastTitle');
  const txt     = document.getElementById('toastMsg');
  const btn     = document.getElementById('toastBtn');

  const map = {
    success: { icon: '✅', btnClass: '',           btnText: 'OK' },
    error:   { icon: '❌', btnClass: 'error-btn',  btnText: 'Close' },
    pending: { icon: '⏳', btnClass: 'pending-btn', btnText: 'OK' }
  };

  const cfg = map[type] || map.success;
  icon.textContent  = cfg.icon;
  icon.className    = `toast-icon ${type}`;
  ttl.textContent   = title;
  txt.textContent   = msg;
  btn.className     = `toast-btn ${cfg.btnClass}`;
  btn.textContent   = cfg.btnText;
  overlay.classList.add('show');
}

function closeToast() {
  document.getElementById('toastOverlay').classList.remove('show');
}

function showSpinner() {
  document.getElementById('spinnerOverlay').classList.add('show');
}

function hideSpinner() {
  document.getElementById('spinnerOverlay').classList.remove('show');
}

// ── PURCHASE ─────────────────────────────────────────────
async function purchaseData() {
  const phone = document.getElementById('phoneNumber').value.trim();

  if (!selectedPlanId) {
    showToast('error', 'No Plan Selected', 'Please select a data plan first.');
    return;
  }
  if (!phone || phone.length < 11) {
    showToast('error', 'Invalid Number', 'Please enter a valid 11-digit phone number.');
    return;
  }
  if (userBalance < selectedPrice) {
    showToast('error', 'Insufficient Balance',
      `Your balance ₦${userBalance.toLocaleString()} is not enough. Please fund your wallet.`);
    return;
  }

  showSpinner();

  try {
    const payload = {
      plan: selectedPlanId,
      phone_number: phone,
      pin_code: BIGISUB_CONFIG.PIN_CODE
    };

    const result = await bigisubRequest('purchase/', 'POST', payload);

    hideSpinner();

    if (result.success || result.status === 'success') {
      // Deduct balance
      userBalance -= selectedPrice;
      localStorage.setItem('userBalance', userBalance);
      document.getElementById('balanceDisplay').textContent =
        '₦' + userBalance.toLocaleString() + '.00';

      // Save transaction
      const tx = {
        type:   `${networkMap[currentNetwork].name} Data – ${selectedPlan}`,
        amount: `-₦${selectedPrice.toLocaleString()}`,
        date:   new Date().toLocaleString()
      };
      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      txs.unshift(tx);
      localStorage.setItem('transactions', JSON.stringify(txs.slice(0, 50)));

      showToast('success', 'Purchase Successful!',
        `${selectedPlan} data has been sent to ${phone} successfully.`);

      // Reset
      resetSelection();
      document.getElementById('phoneNumber').value = '';

    } else {
      showToast('error', 'Purchase Failed',
        result.message || result.error || 'Something went wrong. Please try again.');
    }

  } catch (err) {
    hideSpinner();
    showToast('error', 'Network Error', 'Could not reach the server. Check your internet and try again.');
    console.error(err);
  }
}

</script>
