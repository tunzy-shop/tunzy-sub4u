<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 15px 0;
        }

        .network-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .network-btn:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
        }

        .network-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #0066cc;
            background: white;
        }

        .network-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .network-name {
            font-weight: 600;
            font-size: 14px;
        }

        .sme-badge {
            background: #ffc107;
            color: #333;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .gift-option {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gift-option label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .gift-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .plan-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .plan-card:hover {
            border-color: #0066cc;
        }

        .plan-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .plan-card.sme-plan {
            border-left: 4px solid #ffc107;
        }

        .plan-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
            color: #333;
        }

        .plan-price {
            color: #0066cc;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 3px;
        }

        .plan-validity {
            font-size: 10px;
            color: #666;
        }

        .plan-badge {
            position: absolute;
            top: -8px;
            right: 5px;
            background: #ffc107;
            color: #333;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .pending-message {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <script src="js/vtpass-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="pending-message" id="pendingMessage"></div>

            <div class="section-title">Select Network</div>
            <div class="network-grid" id="networkGrid">
                <!-- MTN -->
                <div class="network-btn" onclick="selectNetwork('mtn')" id="net-mtn">
                    <div class="network-image">
                        <img src="assets/networks/mtn-logo.png" alt="MTN">
                    </div>
                    <span class="network-name">MTN</span>
                </div>
                
                <!-- GLO -->
                <div class="network-btn" onclick="selectNetwork('glo')" id="net-glo">
                    <div class="network-image">
                        <img src="assets/networks/glo-logo.png" alt="GLO">
                    </div>
                    <span class="network-name">GLO</span>
                    <span class="sme-badge">SME</span>
                </div>
                
                <!-- Airtel -->
                <div class="network-btn" onclick="selectNetwork('airtel')" id="net-airtel">
                    <div class="network-image">
                        <img src="assets/networks/airtel-logo.jpeg" alt="AIRTEL">
                    </div>
                    <span class="network-name">AIRTEL</span>
                </div>
                
                <!-- 9mobile -->
                <div class="network-btn" onclick="selectNetwork('9mobile')" id="net-9mobile">
                    <div class="network-image">
                        <img src="assets/networks/9mobile-logo.jpeg" alt="9MOBILE">
                    </div>
                    <span class="network-name">9MOBILE</span>
                </div>
            </div>

            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="08012345678" value="08012345678">
            </div>

            <div class="gift-option">
                <label>
                    <input type="checkbox" id="isGift"> 🎁 Buy as gift (for someone else)
                </label>
            </div>

            <div class="section-title" id="plansTitle">Select Plan</div>
            <div class="plans-grid" id="plansContainer">
                <!-- Plans loaded by JavaScript -->
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseData()" disabled>Select a plan</button>
        </div>
    </div>

    <script>
        // ============================================
        // DATA PLANS FROM VTPASS WITH PROFIT MARGINS
        // ============================================
        
        const dataPlans = {
            mtn: {
                serviceId: VTPASS_CONFIG.services.MTN_DATA,
                plans: [
                    { code: 'mtn-10mb-100', name: '110MB Daily', cost: 100, sellingPrice: calculateDataPrice(100), validity: '1 Day' },
                    { code: 'mtn-50mb-200', name: '200MB', cost: 200, sellingPrice: calculateDataPrice(200), validity: '2 Days' },
                    { code: 'mtn-100mb-1000', name: '1.5GB', cost: 1000, sellingPrice: calculateDataPrice(1000), validity: '30 Days' },
                    { code: 'mtn-500mb-2000', name: '4.5GB', cost: 2000, sellingPrice: calculateDataPrice(2000), validity: '30 Days' },
                    { code: 'mtn-20hrs-1500', name: '6GB', cost: 1500, sellingPrice: calculateDataPrice(1500), validity: '7 Days' },
                    { code: 'mtn-3gb-2500', name: '6GB', cost: 2500, sellingPrice: calculateDataPrice(2500), validity: '30 Days' },
                    { code: 'mtn-data-3000', name: '8GB', cost: 3000, sellingPrice: calculateDataPrice(3000), validity: '30 Days' },
                    { code: 'mtn-1gb-3500', name: '10GB', cost: 3500, sellingPrice: calculateDataPrice(3500), validity: '30 Days' },
                    { code: 'mtn-100hr-5000', name: '15GB', cost: 5000, sellingPrice: calculateDataPrice(5000), validity: '30 Days' },
                    { code: 'mtn-3gb-6000', name: '20GB', cost: 6000, sellingPrice: calculateDataPrice(6000), validity: '30 Days' },
                    { code: 'mtn-40gb-10000', name: '40GB', cost: 10000, sellingPrice: calculateDataPrice(10000), validity: '30 Days' },
                    { code: 'mtn-25gb-sme-10000', name: '25GB SME', cost: 10000, sellingPrice: calculateDataPrice(10000), validity: '30 Days', sme: true },
                    { code: 'mtn-2-5gb-600', name: '2.5GB', cost: 600, sellingPrice: calculateDataPrice(600), validity: '2 Days' },
                    { code: 'mtn-7gb-2000', name: '7GB', cost: 2000, sellingPrice: calculateDataPrice(2000), validity: '7 Days' }
                ]
            },
            
            glo: {
                serviceId: VTPASS_CONFIG.services.GLO_DATA,
                plans: [
                    { code: 'glo100', name: '105MB', cost: 100, sellingPrice: calculateDataPrice(100), validity: '2 Days' },
                    { code: 'glo200', name: '350MB', cost: 200, sellingPrice: calculateDataPrice(200), validity: '4 Days' },
                    { code: 'glo500', name: '1.05GB', cost: 500, sellingPrice: calculateDataPrice(500), validity: '14 Days' },
                    { code: 'glo1000', name: '2.5GB', cost: 1000, sellingPrice: calculateDataPrice(1000), validity: '30 Days' },
                    { code: 'glo2000', name: '5.8GB', cost: 2000, sellingPrice: calculateDataPrice(2000), validity: '30 Days' },
                    { code: 'glo3000', name: '10GB', cost: 3000, sellingPrice: calculateDataPrice(3000), validity: '30 Days' },
                    { code: 'glo-dg-70', name: '200MB SME', cost: 70, sellingPrice: calculateDataPrice(70), validity: '14 Days', sme: true },
                    { code: 'glo-dg-320', name: '1GB SME', cost: 320, sellingPrice: calculateDataPrice(320), validity: '30 Days', sme: true },
                    { code: 'glo-dg-640', name: '2GB SME', cost: 640, sellingPrice: calculateDataPrice(640), validity: '30 Days', sme: true },
                    { code: 'glo-special-300', name: '1GB Special', cost: 300, sellingPrice: calculateDataPrice(300), validity: 'Special' }
                ]
            },
            
            airtel: {
                serviceId: VTPASS_CONFIG.services.AIRTEL_DATA,
                plans: [
                    { code: 'airt-50', name: '25MB', cost: 50, sellingPrice: calculateDataPrice(50), validity: '1 Day' },
                    { code: 'airt-100', name: '75MB', cost: 100, sellingPrice: calculateDataPrice(100), validity: '1 Day' },
                    { code: 'airt-200', name: '200MB', cost: 200, sellingPrice: calculateDataPrice(200), validity: '3 Days' },
                    { code: 'airt-300', name: '350MB', cost: 300, sellingPrice: calculateDataPrice(300), validity: '7 Days' },
                    { code: 'airt-500', name: '750MB', cost: 500, sellingPrice: calculateDataPrice(500), validity: '14 Days' },
                    { code: 'airt-1000', name: '1.5GB', cost: 1000, sellingPrice: calculateDataPrice(1000), validity: '30 Days' },
                    { code: 'airt-1500', name: '3GB', cost: 1500, sellingPrice: calculateDataPrice(1500), validity: '30 Days' },
                    { code: 'airt-2000', name: '4.5GB', cost: 2000, sellingPrice: calculateDataPrice(2000), validity: '30 Days' },
                    { code: 'airt-400-1', name: '1.5GB', cost: 400, sellingPrice: calculateDataPrice(400), validity: '1 Day' }
                ]
            },
            
            '9mobile': {
                serviceId: VTPASS_CONFIG.services.NINEMOBILE_DATA,
                plans: [
                    { code: 'eti-100', name: '100MB', cost: 100, sellingPrice: calculateDataPrice(100), validity: '1 Day' },
                    { code: 'eti-200', name: '650MB', cost: 200, sellingPrice: calculateDataPrice(200), validity: '1 Day' },
                    { code: 'eti-500', name: '500MB', cost: 500, sellingPrice: calculateDataPrice(500), validity: '30 Days' },
                    { code: 'eti-1000', name: '1.5GB', cost: 1000, sellingPrice: calculateDataPrice(1000), validity: '30 Days' },
                    { code: 'eti-2000', name: '4.5GB', cost: 2000, sellingPrice: calculateDataPrice(2000), validity: '30 Days' },
                    { code: 'eti-5000', name: '15GB', cost: 5000, sellingPrice: calculateDataPrice(5000), validity: '30 Days' },
                    { code: 'eti-300', name: '1GB + 100MB', cost: 300, sellingPrice: calculateDataPrice(300), validity: '1 Day' }
                ]
            }
        };

        // State
        let currentNetwork = 'mtn';
        let selectedPlan = null;
        let selectedCode = '';
        let selectedPrice = 0;
        let selectedCost = 0;
        let userBalance = 0;
        let currentRequestId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            selectNetwork('mtn');
        });

        // Select network
        function selectNetwork(network) {
            currentNetwork = network;
            
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`net-${network}`).classList.add('selected');
            
            loadPlans(network);
            selectedPlan = null;
            updatePurchaseButton();
        }

        // Load plans for selected network
        function loadPlans(network) {
            const container = document.getElementById('plansContainer');
            const networkPlans = dataPlans[network].plans;
            
            let html = '';
            networkPlans.forEach(plan => {
                const isSME = plan.sme || false;
                html += `
                    <div class="plan-card ${isSME ? 'sme-plan' : ''}" onclick="selectPlan('${plan.code}', '${plan.name}', ${plan.sellingPrice}, ${plan.cost})">
                        ${isSME ? '<span class="plan-badge">SME</span>' : ''}
                        <div class="plan-name">${plan.name}</div>
                        <div class="plan-price">₦${plan.sellingPrice}</div>
                        <div class="plan-validity">${plan.validity}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Select plan
        function selectPlan(code, name, price, cost) {
            selectedCode = code;
            selectedPlan = name;
            selectedPrice = price;
            selectedCost = cost;
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePurchaseButton();
        }

        // Update purchase button
        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const phone = document.getElementById('phoneNumber').value;
            
            if (selectedPlan && phone.length >= 11) {
                btn.disabled = false;
                btn.textContent = `Pay ₦${selectedPrice} for ${selectedPlan}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Select a plan';
            }
        }

        // Show messages
        function showError(msg) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            document.getElementById('pendingMessage').style.display = 'block';
            document.getElementById('pendingMessage').textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        // Purchase data
        async function purchaseData() {
            const phone = document.getElementById('phoneNumber').value;
            const isGift = document.getElementById('isGift').checked;
            const recipientPhone = isGift ? phone : phone;
            
            if (!selectedPlan) {
                showError('Please select a plan');
                return;
            }
            
            if (phone.length < 11) {
                showError('Please enter a valid phone number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                showError('Insufficient balance. Please fund your wallet');
                return;
            }

            showPending('Processing transaction...');

            try {
                const payload = {
                    serviceID: dataPlans[currentNetwork].serviceId,
                    billersCode: recipientPhone,
                    variation_code: selectedCode,
                    amount: selectedCost,
                    phone: recipientPhone
                };
                
                const result = await vtpassApiCall('/pay', payload);
                const response = result.handled;
                
                hidePending();
                
                if (response.isSuccess && result.content?.transactions?.status === 'delivered') {
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    recordProfit(
                        `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                        selectedCost,
                        selectedPrice,
                        `Phone: ${recipientPhone}`
                    );
                    
                    const transaction = {
                        type: `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                        amount: `-₦${selectedPrice}`,
                        date: new Date().toLocaleString()
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ${selectedPlan} data sent to ${recipientPhone}`);
                    
                    selectedPlan = null;
                    updatePurchaseButton();
                    
                } else if (response.isPending) {
                    showPending('Transaction processing. Please wait...');
                    currentRequestId = result.requestId;
                    setTimeout(() => requeryTransaction(currentRequestId), 10000);
                    
                } else {
                    showError(response.message);
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }

        // Requery transaction
        async function requeryTransaction(requestId) {
            if (!requestId) return;
            
            try {
                const result = await requeryTransaction(requestId);
                
                if (result.content?.transactions?.status === 'delivered') {
                    hidePending();
                    showSuccess('✅ Transaction completed successfully!');
                } else if (result.content?.transactions?.status === 'pending') {
                    setTimeout(() => requeryTransaction(requestId), 15000);
                } else {
                    hidePending();
                    showError('Transaction failed. Contact support');
                }
                
            } catch (error) {
                console.error('Requery failed:', error);
            }
        }

        document.getElementById('phoneNumber').addEventListener('input', updatePurchaseButton);
    </script>
</body>
</html>
