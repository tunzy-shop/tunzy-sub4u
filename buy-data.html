<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .network-selector {
            padding: 20px;
        }
        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .network-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .network-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }
        .network-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .plans-list {
            padding: 20px;
        }
        .plan-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .plan-item:hover {
            border-color: #0066cc;
        }
        .purchase-btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>

        <div class="network-selector">
            <h3>Select Network</h3>
            <div class="network-grid">
                <div class="network-card selected" onclick="selectNetwork('mtn')">
                    <img src="assets/networks/mtn-logo.jpg" alt="MTN">
                    <div>MTN</div>
                </div>
                <div class="network-card" onclick="selectNetwork('glo')">
                    <img src="assets/networks/glo-logo.jpg" alt="GLO">
                    <div>GLO</div>
                </div>
                <div class="network-card" onclick="selectNetwork('airtel')">
                    <img src="assets/networks/airtel-logo.jpg" alt="AIRTEL">
                    <div>AIRTEL</div>
                </div>
                <div class="network-card" onclick="selectNetwork('9mobile')">
                    <img src="assets/networks/etisalat-logo.jpg" alt="9MOBILE">
                    <div>9MOBILE</div>
                </div>
            </div>
        </div>

        <div class="plans-list">
            <h3>Select Plan</h3>
            <div class="plan-item">
                <div>
                    <div style="font-weight: bold;">1GB</div>
                    <div style="font-size: 12px; color: #999;">Monthly Plan</div>
                </div>
                <div style="font-weight: bold; color: #0066cc;">₦500</div>
            </div>
            <div class="plan-item">
                <div>
                    <div style="font-weight: bold;">2GB</div>
                    <div style="font-size: 12px; color: #999;">Monthly Plan</div>
                </div>
                <div style="font-weight: bold; color: #0066cc;">₦1000</div>
            </div>
            <div class="plan-item">
                <div>
                    <div style="font-weight: bold;">5GB</div>
                    <div style="font-size: 12px; color: #999;">Monthly Plan</div>
                </div>
                <div style="font-weight: bold; color: #0066cc;">₦2000</div>
            </div>
        </div>

        <button class="purchase-btn">Purchase Data</button>
    </div>

    <script>
        function selectNetwork(network) {
            document.querySelectorAll('.network-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }
    </script>
</body>
</html>
