<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .network-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .network-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .plan-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .plan-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <h3>Select Network</h3>
            <div class="network-grid">
                <div class="network-btn selected">MTN</div>
                <div class="network-btn">GLO</div>
                <div class="network-btn">Airtel</div>
                <div class="network-btn">9mobile</div>
            </div>

            <div class="phone-input">
                <input type="tel" placeholder="Phone Number" value="08012345678">
            </div>

            <h3>Select Plan</h3>
            <div class="plans-grid">
                <div class="plan-card selected">1GB - ₦500</div>
                <div class="plan-card">2GB - ₦1000</div>
                <div class="plan-card">3GB - ₦1500</div>
                <div class="plan-card">5GB - ₦2000</div>
            </div>

            <button class="purchase-btn">Buy Data</button>
        </div>
    </div>
</body>
</html>
