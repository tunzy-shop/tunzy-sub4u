<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            padding: 20px;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0066cc;
            margin: 20px 0 15px;
        }

        /* Network images in circles */
        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .network-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .network-btn:hover {
            border-color: #0066cc;
            transform: translateY(-2px);
        }

        .network-btn.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #0066cc;
            background: white;
        }

        .network-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .network-name {
            font-weight: 600;
            color: #333;
        }

        .phone-input {
            margin: 20px 0;
        }

        .phone-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .plan-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #0066cc;
        }

        .plan-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .plan-size {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .plan-price {
            color: #0066cc;
            font-weight: 600;
        }

        .purchase-btn {
            width: 100%;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .purchase-btn:hover {
            background: #004d99;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>

        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight: bold; color: #0066cc;" id="balanceDisplay">₦0.00</span>
            </div>

            <div class="section-title">Select Network</div>
            <div class="network-grid">
                <!-- MTN -->
                <div class="network-btn" onclick="selectNetwork('mtn')" id="net-mtn">
                    <div class="network-image">
                        <img src="assets/networks/mtn-logo.png" alt="MTN" onerror="this.src='https://via.placeholder.com/60/ffcc00/000000?text=MTN'">
                    </div>
                    <span class="network-name">MTN</span>
                </div>
                
                <!-- GLO -->
                <div class="network-btn" onclick="selectNetwork('glo')" id="net-glo">
                    <div class="network-image">
                        <img src="assets/networks/glo-logo.png" alt="GLO" onerror="this.src='https://via.placeholder.com/60/00a859/ffffff?text=GLO'">
                    </div>
                    <span class="network-name">GLO</span>
                </div>
                
                <!-- Airtel -->
                <div class="network-btn" onclick="selectNetwork('airtel')" id="net-airtel">
                    <div class="network-image">
                        <img src="assets/networks/airtel-logo.jpeg" alt="AIRTEL" onerror="this.src='https://via.placeholder.com/60/e60000/ffffff?text=AIRTEL'">
                    </div>
                    <span class="network-name">AIRTEL</span>
                </div>
                
                <!-- 9mobile -->
                <div class="network-btn" onclick="selectNetwork('9mobile')" id="net-9mobile">
                    <div class="network-image">
                        <img src="assets/networks/9mobile-logo.jpeg" alt="9MOBILE" onerror="this.src='https://via.placeholder.com/60/00aeef/ffffff?text=9MOBILE'">
                    </div>
                    <span class="network-name">9MOBILE</span>
                </div>
            </div>

            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="08012345678" value="08012345678">
            </div>

            <div class="section-title">Select Plan</div>
            <div class="plans-grid" id="plansContainer">
                <!-- Plans loaded by JavaScript -->
            </div>

            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseData()" disabled>Select a plan</button>
        </div>
    </div>

    <script>
        // Data plans
        const dataPlans = {
            mtn: [
                { size: '100MB', price: 100 },
                { size: '350MB', price: 200 },
                { size: '750MB', price: 300 },
                { size: '1GB', price: 500 },
                { size: '2GB', price: 1000 },
                { size: '5GB', price: 2000 }
            ],
            glo: [
                { size: '500MB', price: 300 },
                { size: '1GB', price: 500 },
                { size: '2GB', price: 800 },
                { size: '3GB', price: 1200 }
            ],
            airtel: [
                { size: '500MB', price: 300 },
                { size: '1GB', price: 500 },
                { size: '2GB', price: 900 },
                { size: '3GB', price: 1300 }
            ],
            '9mobile': [
                { size: '500MB', price: 250 },
                { size: '1GB', price: 500 },
                { size: '2GB', price: 700 },
                { size: '3GB', price: 1000 }
            ]
        };

        let currentNetwork = 'mtn';
        let selectedPlan = null;
        let selectedPrice = 0;
        let userBalance = 0;

        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            selectNetwork('mtn');
        });

        function selectNetwork(network) {
            currentNetwork = network;
            
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`net-${network}`).classList.add('selected');
            
            loadPlans(network);
            selectedPlan = null;
            updatePurchaseButton();
        }

        function loadPlans(network) {
            const container = document.getElementById('plansContainer');
            const plans = dataPlans[network];
            
            let html = '';
            plans.forEach(plan => {
                html += `
                    <div class="plan-card" onclick="selectPlan('${plan.size}', ${plan.price})">
                        <div class="plan-size">${plan.size}</div>
                        <div class="plan-price">₦${plan.price}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function selectPlan(size, price) {
            selectedPlan = size;
            selectedPrice = price;
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePurchaseButton();
        }

        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const phone = document.getElementById('phoneNumber').value;
            
            if (selectedPlan && phone.length >= 11) {
                btn.disabled = false;
                btn.textContent = `Buy ${selectedPlan} for ₦${selectedPrice}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Select a plan';
            }
        }

        function purchaseData() {
            const phone = document.getElementById('phoneNumber').value;
            
            if (!selectedPlan) {
                alert('Please select a plan');
                return;
            }
            
            if (phone.length < 11) {
                alert('Please enter a valid phone number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                alert('Insufficient balance');
                return;
            }
            
            userBalance -= selectedPrice;
            localStorage.setItem('userBalance', userBalance);
            
            const transaction = {
                type: `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                amount: `-₦${selectedPrice}`,
                date: new Date().toLocaleString()
            };
            
            let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
            
            alert(`✅ Success! ${selectedPlan} data sent to ${phone}`);
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            
            selectedPlan = null;
            updatePurchaseButton();
        }

        document.getElementById('phoneNumber').addEventListener('input', updatePurchaseButton);
    </script>
</body>
</html>
