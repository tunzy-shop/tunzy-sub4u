<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
        .app-container{max-width:500px;margin:0 auto;background:white;min-height:100vh}
        .header{background:#0066cc;padding:20px;color:white;display:flex;align-items:center;gap:20px}
        .back-btn{font-size:24px;cursor:pointer;color:white;text-decoration:none}
        .header h1{font-size:20px;font-weight:600}
        .container{padding:20px}
        .balance-info{background:#f8f9fa;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;border:1px solid #e0e0e0}
        .section-title{font-size:16px;font-weight:600;color:#0066cc;margin:20px 0 15px}
        .network-tabs{display:flex;gap:20px;margin:20px 0;justify-content:space-around;flex-wrap:wrap}
        .network-tab{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;opacity:0.7}
        .network-tab.active{opacity:1}
        .network-logo-box{width:70px;height:70px;background:#f8f9fa;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid transparent}
        .network-tab.active .network-logo-box{border-color:#0066cc;background:#e6f0ff}
        .network-logo-box img{width:80%;height:80%;object-fit:contain}
        .network-name{font-weight:600;font-size:14px;color:#333}
        .network-tab.active .network-name{color:#0066cc}
        .phone-input{margin:20px 0}
        .phone-input label{display:block;margin-bottom:8px;font-weight:500}
        .phone-input input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        .category-tabs{display:flex;gap:10px;margin:15px 0;overflow-x:auto}
        .category-tab{padding:8px 20px;background:#f8f9fa;border:2px solid #e0e0e0;border-radius:30px;white-space:nowrap;cursor:pointer;font-size:14px;font-weight:500}
        .category-tab.active{background:#0066cc;color:white;border-color:#0066cc}
        .plans-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:20px 0;max-height:450px;overflow-y:auto}
        .plan-card{background:white;border:2px solid #e0e0e0;border-radius:15px;padding:20px 10px;text-align:center;cursor:pointer;transition:all 0.3s}
        .plan-card:hover{border-color:#0066cc;transform:translateY(-3px)}
        .plan-card.selected{border-color:#0066cc;background:#e6f0ff}
        .plan-name{font-weight:700;font-size:18px;margin-bottom:8px;color:#333}
        .plan-price{color:#0066cc;font-weight:800;font-size:22px;margin-bottom:5px}
        .plan-validity{font-size:12px;color:#999}
        .category-badge{position:absolute;top:-10px;left:10px;background:#28a745;color:white;font-size:10px;padding:3px 10px;border-radius:20px}
        .purchase-btn{width:100%;padding:18px;background:#0066cc;color:white;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin:20px 0}
        .purchase-btn:disabled{background:#ccc}
        .message-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:20px;padding:25px;width:85%;max-width:320px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);z-index:1000;display:none;flex-direction:column;gap:15px}
        .message-box.error{border-top:5px solid #dc3545}
        .message-box.success{border-top:5px solid #28a745}
        .message-box.pending{border-top:5px solid #ffc107}
        .message-icon{font-size:50px}
        .message-title{font-size:20px;font-weight:bold}
        .message-text{color:#666;font-size:14px}
        .message-btn{background:#0066cc;color:white;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-top:10px}
        .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:none}
    </style>
</head>
<body>
    <script src="js/firebase-config.js"></script>
    <script src="js/bigisub-config.js"></script>
    
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>
        <div class="container">
            <div class="balance-info">
                <span>Your Balance</span>
                <span style="font-weight:bold;color:#0066cc" id="balanceDisplay">₦0.00</span>
            </div>
            <div class="section-title">Select Network</div>
            <div class="network-tabs" id="networkTabs"></div>
            <div class="section-title">Select Data Type</div>
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="phone-input">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number">
            </div>
            <div class="section-title">Select Plan</div>
            <div class="plans-grid" id="plansContainer"></div>
            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseData()" disabled>Select a plan</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message-box error" id="errorBox"><div class="message-icon">❌</div><div class="message-title">Error</div><div class="message-text" id="errorText"></div><button class="message-btn" onclick="closeError()">OK</button></div>
    <div class="message-box success" id="successBox"><div class="message-icon">✅</div><div class="message-title">Success</div><div class="message-text" id="successText"></div><button class="message-btn" onclick="closeSuccess()">OK</button></div>
    <div class="message-box pending" id="pendingBox"><div class="message-icon">⏳</div><div class="message-title">Processing</div><div class="message-text" id="pendingText">Please wait...</div></div>

    <script>
        const networks = [
            { id: 'mtn', name: 'MTN', networkId: 1, image: 'assets/networks/mtn-logo.png', categories: ['All', 'SME', 'GIFTING', 'DataTransfer'] },
            { id: 'glo', name: 'GLO', networkId: 2, image: 'assets/networks/glo-logo.png', categories: ['All', 'SME', 'GIFTING'] },
            { id: 'airtel', name: 'AIRTEL', networkId: 3, image: 'assets/networks/airtel-logo.jpeg', categories: ['All', 'SME', 'GIFTING'] },
            { id: '9mobile', name: '9MOBILE', networkId: 4, image: 'assets/networks/9mobile-logo.jpeg', categories: ['All', 'DataTransfer', 'GIFTING'] }
        ];
        
        const dataPlans = {
            mtn: [
                { id: 2, name: '1GB', cost: 640, validity: '30 Days', type: 'SME' },
                { id: 3, name: '2GB', cost: 1160, validity: '30 Days', type: 'SME' },
                { id: 93, name: '1GB', cost: 650, validity: '30 Days', type: 'DataTransfer' },
                { id: 97, name: '500MB', cost: 355, validity: '7 days', type: 'DataTransfer' },
                { id: 142, name: '2GB', cost: 1495, validity: '30 days', type: 'GIFTING' },
                { id: 145, name: '7GB', cost: 3485, validity: '30 Days', type: 'GIFTING' }
            ],
            airtel: [
                { id: 92, name: '1.5GB', cost: 500, validity: '1 day', type: 'GIFTING' },
                { id: 90, name: '75MB', cost: 74, validity: '1 day', type: 'GIFTING' },
                { id: 166, name: '300MB', cost: 125, validity: '1 day', type: 'SME' }
            ],
            glo: [
                { id: 79, name: '150MB', cost: 94, validity: '1 day', type: 'GIFTING' },
                { id: 12, name: '3GB', cost: 473, validity: '1 month', type: 'GIFTING' }
            ],
            '9mobile': [
                { id: 185, name: '40MB', cost: 49, validity: '1 day', type: 'DataTransfer' },
                { id: 190, name: '2GB', cost: 990, validity: '30 Days', type: 'DataTransfer' }
            ]
        };
        
        let currentNetwork = 'mtn', currentCategory = 'All', selectedPlan = null, selectedPlanId = null, selectedPrice = 0, userBalance = 0, YOUR_PROFIT = 50;

        auth.onAuthStateChanged((user) => { if (!user) window.location.href = 'login-page.html'; else loadUserData(); });

        function loadUserData() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            document.getElementById('balanceDisplay').innerText = `₦${userBalance.toLocaleString()}.00`;
            loadNetworks();
        }

        function loadNetworks() {
            let html = '';
            networks.forEach(net => {
                html += `<div class="network-tab ${net.id === 'mtn' ? 'active' : ''}" onclick="switchNetwork('${net.id}')">
                            <div class="network-logo-box"><img src="${net.image}" alt="${net.name}"></div>
                            <span class="network-name">${net.name}</span>
                        </div>`;
            });
            document.getElementById('networkTabs').innerHTML = html;
            loadCategories('mtn');
            loadPlans('mtn', 'All');
        }

        function switchNetwork(network) {
            currentNetwork = network; currentCategory = 'All';
            document.querySelectorAll('.network-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadCategories(network);
            loadPlans(network, 'All');
        }

        function loadCategories(network) {
            let cats = networks.find(n => n.id === network).categories;
            let html = '';
            cats.forEach(cat => { html += `<span class="category-tab ${cat === 'All' ? 'active' : ''}" onclick="switchCategory('${cat}')">${cat}</span>`; });
            document.getElementById('categoryTabs').innerHTML = html;
        }

        function switchCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadPlans(currentNetwork, category);
        }

        function loadPlans(network, category) {
            let plans = dataPlans[network] || [];
            let filtered = category === 'All' ? plans : plans.filter(p => p.type === category);
            let html = '';
            filtered.forEach(plan => {
                let sellingPrice = plan.cost + YOUR_PROFIT;
                html += `<div class="plan-card" onclick="selectPlan(${plan.id}, '${plan.name}', ${sellingPrice})">
                            <div class="plan-name">${plan.name}</div>
                            <div class="plan-price">₦${sellingPrice.toLocaleString()}</div>
                            <div class="plan-validity">${plan.validity}</div>
                        </div>`;
            });
            document.getElementById('plansContainer').innerHTML = html || '<div style="text-align:center;padding:20px">No plans</div>';
        }

        function selectPlan(id, name, price) {
            selectedPlanId = id; selectedPlan = name; selectedPrice = price;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('purchaseBtn').disabled = false;
            document.getElementById('purchaseBtn').innerText = `Pay ₦${price.toLocaleString()}`;
        }

        function showError(msg) { document.getElementById('errorText').innerText = msg; document.getElementById('overlay').style.display = 'block'; document.getElementById('errorBox').style.display = 'flex'; }
        function closeError() { document.getElementById('overlay').style.display = 'none'; document.getElementById('errorBox').style.display = 'none'; }
        function showSuccess(msg) { document.getElementById('successText').innerText = msg; document.getElementById('overlay').style.display = 'block'; document.getElementById('successBox').style.display = 'flex'; setTimeout(() => { closeSuccess(); window.location.href = 'dashboard.html'; }, 2000); }
        function closeSuccess() { document.getElementById('overlay').style.display = 'none'; document.getElementById('successBox').style.display = 'none'; }
        function showPending(msg) { document.getElementById('pendingText').innerText = msg; document.getElementById('overlay').style.display = 'block'; document.getElementById('pendingBox').style.display = 'flex'; }
        function hidePending() { document.getElementById('overlay').style.display = 'none'; document.getElementById('pendingBox').style.display = 'none'; }

        async function purchaseData() {
            let phone = document.getElementById('phoneNumber').value;
            if (!selectedPlanId) { showError('Select a plan'); return; }
            if (!phone || phone.length < 11) { showError('Enter valid phone number'); return; }
            if (userBalance < selectedPrice) { showError('Insufficient balance'); return; }
            showPending('Processing...');
            let networkObj = networks.find(n => n.id === currentNetwork);
            let payload = { plan: selectedPlanId, phone_number: phone, pin_code: BIGISUB_CONFIG.PIN_CODE };
            try {
                let result = await bigisubRequest('purchase/', 'POST', payload);
                hidePending();
                if (result.success === true) {
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').innerText = `₦${userBalance.toLocaleString()}.00`;
                    let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                    transactions.unshift({ type: `${networkObj.name} Data - ${selectedPlan}`, amount: `-₦${selectedPrice.toLocaleString()}`, date: new Date().toLocaleString() });
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    showSuccess(`✅ ${selectedPlan} data sent to ${phone}`);
                    selectedPlanId = null; document.getElementById('purchaseBtn').disabled = true;
                    document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
                } else { showError(result.message || 'Purchase failed'); }
            } catch (error) { hidePending(); showError('Network error'); }
        }
    </script>
</body>
</html>
