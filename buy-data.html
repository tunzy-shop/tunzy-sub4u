<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data - TUNZY SUB 4 YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #0066cc;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .balance-info {
            background: #f8f9fa;
            padding: 15px 20px;
            margin: 10px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .balance-label {
            color: #666;
            font-weight: 500;
        }

        .balance-value {
            font-weight: bold;
            color: #0066cc;
            font-size: 18px;
        }

        .networks-section {
            padding: 20px;
        }

        .networks-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .networks-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .network-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .network-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,102,204,0.1);
        }

        .network-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .network-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .network-name {
            font-weight: 600;
            color: #333;
        }

        .phone-section {
            padding: 0 20px 20px;
        }

        .phone-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-section input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .plans-section {
            padding: 0 20px 20px;
        }

        .plans-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .plans-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .plan-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #0066cc;
        }

        .plan-card.selected {
            border-color: #0066cc;
            background: #e6f0ff;
        }

        .plan-size {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .plan-price {
            color: #0066cc;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .plan-validity {
            font-size: 11px;
            color: #999;
        }

        .purchase-btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .purchase-btn:hover:not(:disabled) {
            background: #004d99;
        }

        .purchase-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            margin: 10px 20px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>Buy Data</h1>
        </div>

        <!-- REAL BALANCE - NO FAKE -->
        <div class="balance-info">
            <span class="balance-label">Your Balance</span>
            <span class="balance-value" id="balanceDisplay">₦0.00</span>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <!-- NETWORKS WITH IMAGES -->
        <div class="networks-section">
            <h3>Select Network</h3>
            <div class="networks-grid" id="networksGrid">
                <!-- MTN -->
                <div class="network-card" onclick="selectNetwork('mtn')" id="net-mtn">
                    <img src="assets/networks/mtn-logo.png" alt="MTN" onerror="this.src='https://via.placeholder.com/60/ffcc00/000000?text=MTN'">
                    <div class="network-name">MTN</div>
                </div>
                
                <!-- GLO -->
                <div class="network-card" onclick="selectNetwork('glo')" id="net-glo">
                    <img src="assets/networks/glo-logo.png" alt="GLO" onerror="this.src='https://via.placeholder.com/60/00a859/ffffff?text=GLO'">
                    <div class="network-name">GLO</div>
                </div>
                
                <!-- Airtel -->
                <div class="network-card" onclick="selectNetwork('airtel')" id="net-airtel">
                    <img src="assets/networks/airtel-logo.jpeg" alt="AIRTEL" onerror="this.src='https://via.placeholder.com/60/e60000/ffffff?text=AIRTEL'">
                    <div class="network-name">AIRTEL</div>
                </div>
                
                <!-- 9mobile -->
                <div class="network-card" onclick="selectNetwork('9mobile')" id="net-9mobile">
                    <img src="assets/networks/9mobile-logo.jpeg" alt="9MOBILE" onerror="this.src='https://via.placeholder.com/60/00aeef/ffffff?text=9MOBILE'">
                    <div class="network-name">9MOBILE</div>
                </div>
            </div>
        </div>

        <!-- Phone Number -->
        <div class="phone-section">
            <label>Phone Number</label>
            <input type="tel" id="phoneNumber" placeholder="08012345678">
        </div>

        <!-- Data Plans - Will be populated based on network -->
        <div class="plans-section">
            <h3>Select Plan</h3>
            <div class="plans-container" id="plansContainer">
                <!-- Plans loaded by JavaScript -->
            </div>
        </div>

        <!-- Purchase Button -->
        <button class="purchase-btn" id="purchaseBtn" onclick="purchaseData()" disabled>Select a plan</button>
    </div>

    <script>
        // ============================================
        // 🔴 YOUR PAYSTACK PUBLIC KEY - PASTE HERE!
        // ============================================
        const PAYSTACK_PUBLIC_KEY = 'pk_live_xxxxxxxxxxxxxxxxxxxxx'; // <-- PASTE YOUR KEY HERE

        // REAL data plans
        const dataPlans = {
            mtn: [
                { size: '100MB', price: 100, validity: 'Daily' },
                { size: '350MB', price: 200, validity: 'Daily' },
                { size: '750MB', price: 300, validity: 'Daily' },
                { size: '1GB', price: 500, validity: 'Monthly' },
                { size: '2GB', price: 1000, validity: 'Monthly' },
                { size: '5GB', price: 2000, validity: 'Monthly' }
            ],
            glo: [
                { size: '500MB', price: 300, validity: 'Weekly' },
                { size: '1GB', price: 500, validity: 'Weekly' },
                { size: '2GB', price: 800, validity: 'Monthly' },
                { size: '3GB', price: 1200, validity: 'Monthly' }
            ],
            airtel: [
                { size: '500MB', price: 300, validity: 'Weekly' },
                { size: '1GB', price: 500, validity: 'Weekly' },
                { size: '2GB', price: 900, validity: 'Monthly' },
                { size: '3GB', price: 1300, validity: 'Monthly' }
            ],
            '9mobile': [
                { size: '500MB', price: 250, validity: 'Weekly' },
                { size: '1GB', price: 500, validity: 'Weekly' },
                { size: '2GB', price: 700, validity: 'Monthly' },
                { size: '3GB', price: 1000, validity: 'Monthly' }
            ]
        };

        // State
        let currentNetwork = 'mtn';
        let selectedPlan = null;
        let selectedPrice = 0;
        let userBalance = 0;
        let userEmail = '';

        // Load REAL user data
        document.addEventListener('DOMContentLoaded', function() {
            userBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
            userEmail = localStorage.getItem('userEmail') || '';
            
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            
            // Select MTN by default
            selectNetwork('mtn');
        });

        // Select network
        function selectNetwork(network) {
            currentNetwork = network;
            
            // Update UI
            document.querySelectorAll('.network-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById(`net-${network}`).classList.add('selected');
            
            // Load plans for this network
            loadPlans(network);
            
            // Reset selection
            selectedPlan = null;
            updatePurchaseButton();
        }

        // Load plans
        function loadPlans(network) {
            const container = document.getElementById('plansContainer');
            const plans = dataPlans[network];
            
            let html = '';
            plans.forEach(plan => {
                html += `
                    <div class="plan-card" onclick="selectPlan('${plan.size}', ${plan.price})">
                        <div class="plan-size">${plan.size}</div>
                        <div class="plan-price">₦${plan.price}</div>
                        <div class="plan-validity">${plan.validity}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Select plan
        function selectPlan(size, price) {
            selectedPlan = size;
            selectedPrice = price;
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePurchaseButton();
        }

        // Update purchase button
        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const phone = document.getElementById('phoneNumber').value;
            
            if (selectedPlan && phone.length >= 11) {
                btn.disabled = false;
                btn.textContent = `Pay ₦${selectedPrice} for ${selectedPlan}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Select a plan';
            }
        }

        // ============================================
        // PURCHASE DATA WITH PAYSTACK
        // ============================================
        async function purchaseData() {
            const phone = document.getElementById('phoneNumber').value;
            
            if (!selectedPlan) {
                showError('Please select a plan');
                return;
            }
            
            if (phone.length < 11) {
                showError('Please enter a valid phone number');
                return;
            }

            // Check if user has enough balance
            if (userBalance < selectedPrice) {
                // Not enough balance - offer to fund via Paystack
                if (confirm(`Insufficient balance! Need ₦${selectedPrice - userBalance} more. Fund wallet now?`)) {
                    fundWallet(selectedPrice - userBalance);
                }
                return;
            }

            // Process purchase with balance
            processPurchase(phone);
        }

        // Process purchase
        function processPurchase(phone) {
            // Deduct from balance
            userBalance -= selectedPrice;
            localStorage.setItem('userBalance', userBalance);
            
            // Record transaction
            const transaction = {
                type: `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                amount: `-₦${selectedPrice}`,
                date: new Date().toLocaleString()
            };
            
            let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
            
            // Update display
            document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
            
            alert(`✅ Success! ${selectedPlan} data sent to ${phone}`);
            
            // Reset
            selectedPlan = null;
            updatePurchaseButton();
        }

        // ============================================
        // FUND WALLET WITH PAYSTACK
        // ============================================
        async function fundWallet(amount) {
            try {
                // Load Paystack if not loaded
                if (!window.PaystackPop) {
                    await loadScript('https://js.paystack.co/v1/inline.js');
                }

                const handler = PaystackPop.setup({
                    key: PAYSTACK_PUBLIC_KEY,      // YOUR KEY HERE
                    email: userEmail,
                    amount: amount * 100,            // Convert to kobo
                    currency: 'NGN',
                    ref: 'TUNZY_' + Date.now(),
                    callback: function(response) {
                        // Payment successful
                        userBalance += amount;
                        localStorage.setItem('userBalance', userBalance);
                        document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                        
                        // Record transaction
                        const transaction = {
                            type: 'Wallet Funding',
                            amount: `+₦${amount}`,
                            date: new Date().toLocaleString()
                        };
                        
                        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                        transactions.unshift(transaction);
                        localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                        
                        alert(`✅ Wallet funded with ₦${amount}`);
                    },
                    onClose: function() {
                        alert('Payment cancelled');
                    }
                });
                
                handler.openIframe();
                
            } catch (error) {
                alert('Payment failed. Please try again.');
                console.error(error);
            }
        }

        // Helper functions
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // Phone input listener
        document.getElementById('phoneNumber').addEventListener('input', updatePurchaseButton);
    </script>
</body>
</html>
