        }

            min-width: 100px;
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;

            border-color: #0066cc;
        }

        .network-tab.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;

            border-color: #0066cc;
        }

        .category-tab.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        }

            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .phone-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .phone-input input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .gift-option {

            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gift-option label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .gift-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .plans-grid {
            display: grid;

            gap: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;

        // Switch network

            currentNetwork = network;
            currentCategory = 'All';
            
            document.querySelectorAll('.network-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${network}`).classList.add('active');
            
            updateCategoryTabs(network);
            loadPlans(network, 'All');
            selectedPlan = null;
            updatePurchaseButton();
        }

        // Update category tabs based on network
        function updateCategoryTabs(network) {
            const container = document.getElementById('categoryTabs');
            const categories = dataPlans[network].categories;
            
            let html = '';
            categories.forEach(cat => {
                html += `<span class="category-tab ${cat === 'All' ? 'active' : ''}" onclick="switchCategory('${cat}')">${cat}</span>`;
            });
            
            container.innerHTML = html;
        }

        // Switch category
        function switchCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === category) {
                    tab.classList.add('active');
                }
            });
            
            loadPlans(currentNetwork, category);
            selectedPlan = null;
            updatePurchaseButton();
        }

        // Load plans for selected network and category

            const container = document.getElementById('plansContainer');
            const allPlans = dataPlans[network].plans;
            
            const filteredPlans = category === 'All' 
                ? allPlans 
                : allPlans.filter(p => p.category === category);

                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">No plans in this category</div>';
                return;
            }

                let badgeClass = '';
                let badgeText = '';

                    badgeClass = 'sme-badge';
                    badgeText = 'SME';

                    badgeClass = 'gift-badge';
                    badgeText = '🎁 GIFT';

                    badgeClass = 'social-badge';
                    badgeText = 'SOCIAL';

                    badgeClass = 'corporate-badge';
                    badgeText = 'CORP';
                }
                
                const profit = plan.sellingPrice - plan.cost;

                    <div class="plan-card" onclick="selectPlan('${plan.code}', '${plan.name}', ${plan.sellingPrice}, ${plan.cost})">

                        <div class="plan-price">₦${plan.sellingPrice}</div>
                        <div class="plan-validity">${plan.validity}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Select plan
        function selectPlan(code, name, price, cost) {
            selectedCode = code;
            selectedPlan = name;
            selectedPrice = price;
            selectedCost = cost;
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePurchaseButton();
        }

        // Update purchase button
        function updatePurchaseButton() {
            const btn = document.getElementById('purchaseBtn');
            const phone = document.getElementById('phoneNumber').value;
            
            if (selectedPlan && phone.length >= 11) {
                btn.disabled = false;
                btn.textContent = `Pay ₦${selectedPrice} for ${selectedPlan}`;
            } else {
                btn.disabled = true;
                btn.textContent = 'Select a plan';
            }
        }

        // Show messages
        function showError(msg) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successMessage').textContent = msg;
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }

        function showPending(msg) {
            document.getElementById('pendingMessage').style.display = 'block';
            document.getElementById('pendingMessage').textContent = msg;
        }

        function hidePending() {
            document.getElementById('pendingMessage').style.display = 'none';
        }

        // Purchase data
        async function purchaseData() {
            const phone = document.getElementById('phoneNumber').value;
            const isGift = document.getElementById('isGift').checked;
            const recipientPhone = isGift ? phone : phone;
            
            if (!selectedPlan) {
                showError('Please select a plan');
                return;
            }
            
            if (!phone || phone.length < 11) {
                showError('Please enter a valid phone number');
                return;
            }
            
            if (userBalance < selectedPrice) {
                showError('Insufficient balance. Please fund your wallet');
                return;
            }

            showPending('Processing transaction...');

            try {
                const payload = {
                    serviceID: dataPlans[currentNetwork].serviceId,
                    billersCode: recipientPhone,
                    variation_code: selectedCode,
                    amount: selectedCost,
                    phone: recipientPhone
                };
                
                const result = await vtpassApiCall('/pay', payload);
                const response = result.handled;
                
                hidePending();
                
                if (response.isSuccess && result.content?.transactions?.status === 'delivered') {
                    userBalance -= selectedPrice;
                    localStorage.setItem('userBalance', userBalance);
                    document.getElementById('balanceDisplay').textContent = `₦${userBalance.toLocaleString()}.00`;
                    
                    recordProfit(
                        `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                        selectedCost,
                        selectedPrice,
                        `Phone: ${recipientPhone}`
                    );
                    
                    const transaction = {
                        type: `${currentNetwork.toUpperCase()} Data - ${selectedPlan}`,
                        amount: `-₦${selectedPrice}`,
                        date: new Date().toLocaleString()
                    };
                    
                    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    transactions.unshift(transaction);
                    localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 20)));
                    
                    showSuccess(`✅ Success! ${selectedPlan} sent to ${recipientPhone}`);
                    
                    selectedPlan = null;
                    updatePurchaseButton();
                    
                } else if (response.isPending) {
                    showPending('Transaction processing. Please wait...');
                    currentRequestId = result.requestId;
                    setTimeout(() => requeryTransaction(currentRequestId), 10000);
                    
                } else {
                    showError(response.message);
                }
                
            } catch (error) {
                hidePending();
                showError('Network error. Please try again');
                console.error(error);
            }
        }

        // Requery transaction
        async function requeryTransaction(requestId) {
            if (!requestId) return;
            
            try {
                const result = await requeryTransaction(requestId);
                
                if (result.content?.transactions?.status === 'delivered') {
                    hidePending();
                    showSuccess('✅ Transaction completed successfully!');
                } else if (result.content?.transactions?.status === 'pending') {
                    setTimeout(() => requeryTransaction(requestId), 15000);
                } else {
                    hidePending();
                    showError('Transaction failed. Contact support');
                }
                
            } catch (error) {
                console.error('Requery failed:', error);
            }
        }

        // Phone input listener
        document.getElementById('phoneNumber').addEventListener('input', updatePurchaseButton);
    </script>
</body>
</html>
